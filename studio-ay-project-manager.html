<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HAMOUNI Studio — Work OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM — Linear / Vercel / Stripe grade
   ============================================================ */
:root {
  /* Palette */
  --c-bg:       #09090b;
  --c-surface:  #111113;
  --c-surface2: #18181b;
  --c-surface3: #1c1c1f;
  --c-border:   rgba(255,255,255,.06);
  --c-border2:  rgba(255,255,255,.10);
  --c-border3:  rgba(255,255,255,.16);
  --c-text:     #fafafa;
  --c-text2:    #a1a1aa;
  --c-text3:    #52525b;
  --c-accent:   #C9A86C;
  --c-accent-d: rgba(201,168,108,.1);
  --c-accent-b: rgba(201,168,108,.25);
  --c-green:    #22c55e;
  --c-blue:     #3b82f6;
  --c-red:      #ef4444;
  --c-amber:    #f59e0b;
  --c-purple:   #a855f7;
  /* Layout */
  --sidebar-w:  248px;
  --r:          8px;
  --r-lg:       12px;
  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body:    'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button, input, select, textarea {
  font-family: var(--font-body);
  font-size: 13px;
}
button { cursor: pointer; }

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

/* ============================================================
   ADMIN LAYOUT
   ============================================================ */
#admin { display: flex; min-height: 100vh; }

/* ---- SIDEBAR ---- */
.sb {
  width: var(--sidebar-w);
  background: var(--c-surface);
  border-right: 1px solid var(--c-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 200;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sb-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sb-logo-mark {
  display: flex;
  align-items: center;
  gap: 9px;
}
.sb-logo-icon {
  width: 28px; height: 28px;
  background: var(--c-accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 800;
  color: #000;
  flex-shrink: 0;
}
.sb-logo-name {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--c-text);
  letter-spacing: -.01em;
}
.sb-logo-sub {
  font-size: 10px;
  color: var(--c-text3);
  letter-spacing: .04em;
  margin-top: 1px;
}
.sb-close {
  display: none;
  background: none;
  border: none;
  color: var(--c-text3);
  padding: 4px;
  border-radius: 4px;
  line-height: 1;
}
.sb-close:hover { color: var(--c-text2); }
.sb-nav { padding: 10px 8px; flex: 1; overflow-y: auto; }
.sb-section {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--c-text3);
  padding: 10px 10px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13px;
  color: var(--c-text2);
  transition: all .12s;
  margin-bottom: 1px;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.04); color: var(--c-text); }
.nav-item.active { background: rgba(201,168,108,.08); color: var(--c-accent); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 16px;
  background: var(--c-accent);
  border-radius: 0 2px 2px 0;
}
.nav-item svg { flex-shrink: 0; opacity: .7; }
.nav-item.active svg { opacity: 1; }
.p-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sb-footer {
  padding: 12px;
  border-top: 1px solid var(--c-border);
}
.user-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--c-surface2);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
}
.user-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-accent), #8B5E2A);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  font-family: var(--font-display);
}
.user-name { font-size: 12px; font-weight: 500; color: var(--c-text); }
.user-role { font-size: 10px; color: var(--c-text3); }
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-green);
  margin-left: auto;
  flex-shrink: 0;
}
.sync-dot.syncing { animation: blink 1s ease infinite; background: var(--c-amber); }
.sync-dot.error { background: var(--c-red); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ---- MAIN ---- */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 190;
  backdrop-filter: blur(2px);
}

/* ---- TOPBAR ---- */
.topbar {
  height: 52px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--c-border);
  background: rgba(9,9,11,.92);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 100;
  gap: 12px;
}
.tb-l { display: flex; align-items: center; gap: 10px; }
.hamburger {
  display: none;
  background: none;
  border: 1px solid var(--c-border2);
  border-radius: 6px;
  color: var(--c-text2);
  padding: 5px 7px;
  line-height: 1;
  transition: all .15s;
}
.hamburger:hover { background: rgba(255,255,255,.04); color: var(--c-text); }
.tb-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.01em;
}
.tb-r { display: flex; align-items: center; gap: 8px; }

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--r);
  border: none;
  font-size: 12px;
  font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
  line-height: 1;
}
.btn-primary {
  background: var(--c-accent);
  color: #000;
}
.btn-primary:hover { background: #d4b47a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,108,.2); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost {
  background: transparent;
  color: var(--c-text2);
  border: 1px solid var(--c-border2);
}
.btn-ghost:hover { background: rgba(255,255,255,.04); color: var(--c-text); border-color: var(--c-border3); }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.btn-icon {
  background: none;
  border: none;
  color: var(--c-text3);
  padding: 5px;
  border-radius: 5px;
  line-height: 1;
  transition: all .12s;
}
.btn-icon:hover { background: rgba(255,255,255,.06); color: var(--c-text2); }
.btn-icon.danger:hover { background: rgba(239,68,68,.1); color: var(--c-red); }

/* ---- VIEWS ---- */
.view { display: none; padding: 28px 24px; animation: viewIn .2s ease; }
.view.active { display: block; }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ---- STAT CARDS ---- */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.stat {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  transition: border-color .2s;
}
.stat:hover { border-color: var(--c-border2); }
.stat-lbl { font-size: 11px; font-weight: 500; color: var(--c-text3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 10px; }
.stat-val { font-size: 28px; font-weight: 300; font-family: var(--font-display); color: var(--c-text); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--c-text3); margin-top: 5px; }
.stat.hi { border-color: rgba(201,168,108,.2); background: rgba(201,168,108,.04); }
.stat.hi .stat-val { color: var(--c-accent); }

/* ---- PROJECT GRID ---- */
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sh-title { font-size: 13px; font-weight: 600; font-family: var(--font-display); color: var(--c-text2); text-transform: uppercase; letter-spacing: .06em; }
.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

/* ---- PROJECT CARD ---- */
.pc {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 20px;
  cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.pc::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pc-color) 30%, transparent 70%);
  opacity: .6;
}
.pc:hover {
  border-color: var(--c-border3);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.pc-name { font-size: 14px; font-weight: 600; font-family: var(--font-display); color: var(--c-text); letter-spacing: -.01em; }
.pc-client { font-size: 11px; color: var(--c-text3); margin-top: 3px; font-weight: 400; }
.badge {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.b-active  { background: rgba(34,197,94,.1);  color: var(--c-green);  border: 1px solid rgba(34,197,94,.2); }
.b-planning{ background: rgba(168,85,247,.1); color: var(--c-purple); border: 1px solid rgba(168,85,247,.2); }
.b-pending { background: rgba(59,130,246,.1); color: var(--c-blue);   border: 1px solid rgba(59,130,246,.2); }
.b-urgent  { background: rgba(239,68,68,.1);  color: var(--c-red);    border: 1px solid rgba(239,68,68,.2); }
.pc-desc { font-size: 12px; color: var(--c-text3); line-height: 1.6; margin-bottom: 16px; }
.pc-progress { margin-bottom: 12px; }
.pc-pbar-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--c-text3); margin-bottom: 6px; }
.pbar { height: 2px; background: rgba(255,255,255,.06); border-radius: 1px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 1px; background: var(--pc-color); transition: width .6s cubic-bezier(.4,0,.2,1); }
.pc-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.pc-meta-i { font-size: 11px; color: var(--c-text3); display: flex; align-items: center; gap: 4px; }
.pc-meta-i.accent { color: var(--c-accent); }

/* ---- DETAIL VIEW ---- */
.detail-header {
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  padding: 24px;
}
.dh-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
.dh-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.dh-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--c-text); }
.dh-client { font-size: 13px; color: var(--c-text3); margin-top: 4px; }
.dh-progress { text-align: right; }
.dh-pct { font-family: var(--font-display); font-size: 32px; font-weight: 700; line-height: 1; }
.dh-pct-label { font-size: 10px; color: var(--c-text3); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
.dh-pbar { width: 160px; margin-top: 8px; margin-left: auto; }
.tab-bar { display: flex; gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab-bar::-webkit-scrollbar { height: 0; }
.tab {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--c-text3);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
  user-select: none;
  border: 1px solid transparent;
}
.tab:hover { color: var(--c-text2); background: rgba(255,255,255,.04); }
.tab.active { color: var(--c-text); background: var(--c-surface2); border-color: var(--c-border2); }
.dc { padding: 24px; }
.tp { display: none; animation: viewIn .15s ease; }
.tp.active { display: block; }

/* ---- KANBAN ---- */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.k-col {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 14px;
}
.k-col-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--c-border);
}
.k-col-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--c-text3); }
.k-col-count {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--c-surface2);
  color: var(--c-text3);
  border: 1px solid var(--c-border);
}
.t-card {
  background: var(--c-surface2);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  padding: 11px 12px;
  margin-bottom: 6px;
  transition: all .15s;
  position: relative;
}
.t-card:hover { border-color: var(--c-border2); background: var(--c-surface3); }
.t-card-top { display: flex; align-items: flex-start; gap: 9px; }
.t-circle {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--c-border3);
  flex-shrink: 0;
  cursor: pointer;
  transition: all .18s;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700;
}
.t-circle:hover { border-color: var(--c-accent); background: rgba(201,168,108,.1); }
.t-circle.done { background: var(--c-green); border-color: var(--c-green); color: #fff; }
.t-circle.prog { background: var(--c-blue); border-color: var(--c-blue); }
.t-name { font-size: 12.5px; color: var(--c-text); line-height: 1.45; flex: 1; }
.t-name.struck { text-decoration: line-through; color: var(--c-text3); }
.t-note { font-size: 11px; color: var(--c-text3); margin-top: 5px; padding-left: 25px; font-style: italic; }
.t-footer {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding-left: 25px;
  opacity: 0;
  transition: opacity .15s;
  flex-wrap: wrap;
}
.t-card:hover .t-footer { opacity: 1; }
.t-tag {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.ic-btn {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--c-border2);
  background: none;
  color: var(--c-text3);
  transition: all .12s;
  cursor: pointer;
}
.ic-btn:hover { background: rgba(255,255,255,.06); color: var(--c-text2); border-color: var(--c-border3); }
.ic-btn.red:hover { background: rgba(239,68,68,.1); color: var(--c-red); border-color: rgba(239,68,68,.25); }
.add-row {
  width: 100%;
  padding: 8px;
  border-radius: var(--r);
  border: 1px dashed rgba(255,255,255,.08);
  background: transparent;
  color: var(--c-text3);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.add-row:hover { background: rgba(255,255,255,.03); color: var(--c-text2); border-color: rgba(255,255,255,.14); }
.hint-bar {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  padding: 9px 14px;
  font-size: 11px;
  color: var(--c-text3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ---- ÉTAPES ---- */
.etape-list { position: relative; }
.etape-item {
  display: flex;
  gap: 16px;
  margin-bottom: 4px;
}
.etape-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 22px;
  flex-shrink: 0;
  padding-top: 3px;
}
.etape-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--c-border3);
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 800;
  color: transparent;
  flex-shrink: 0;
  position: relative; z-index: 1;
}
.etape-dot:hover { border-color: var(--c-accent); }
.etape-dot.done { background: var(--c-green); border-color: var(--c-green); color: #fff; }
.etape-dot.curr { background: var(--c-accent); border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(201,168,108,.15); }
.etape-line {
  width: 1px;
  flex: 1;
  min-height: 20px;
  background: var(--c-border);
  margin: 4px 0;
}
.etape-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 10px;
  flex: 1;
  transition: all .18s;
}
.etape-card:hover { border-color: var(--c-border2); }
.etape-card.curr-card { border-color: rgba(201,168,108,.25); background: rgba(201,168,108,.03); }
.etape-date { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--c-text3); margin-bottom: 5px; }
.etape-name { font-size: 14px; font-weight: 600; font-family: var(--font-display); color: var(--c-text); margin-bottom: 4px; }
.etape-desc { font-size: 12px; color: var(--c-text3); line-height: 1.5; margin-bottom: 10px; }
.etape-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.es-done  { background: rgba(34,197,94,.1);  color: var(--c-green);  border: 1px solid rgba(34,197,94,.2); }
.es-curr  { background: rgba(201,168,108,.1);color: var(--c-accent); border: 1px solid rgba(201,168,108,.25); }
.es-todo  { background: rgba(255,255,255,.04);color: var(--c-text3); border: 1px solid var(--c-border); }
.etape-acts { display: flex; gap: 5px; margin-top: 8px; opacity: 0; transition: opacity .15s; }
.etape-card:hover .etape-acts { opacity: 1; }

/* ---- RAPPORT ---- */
.rapport-wrap { max-width: 700px; }
.rapport-header-block {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.rapport-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--c-text); }
.rapport-sub { font-size: 12px; color: var(--c-text3); margin-top: 3px; }
.rapport-pct { font-family: var(--font-display); font-size: 36px; font-weight: 700; line-height: 1; }
.rapport-section { margin-bottom: 20px; }
.rapport-sh { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--c-text3); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.rapport-sh::after { content: ''; flex: 1; height: 1px; background: var(--c-border); }
.rapport-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r);
  margin-bottom: 5px;
  font-size: 13px;
}
.rapport-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ---- NOTES ---- */
.notes-wrap {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 18px;
}
.notes-ta {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--c-text);
  font-size: 13px;
  line-height: 1.8;
  resize: none;
  outline: none;
  min-height: 200px;
}
.notes-ta::placeholder { color: var(--c-text3); }
.notes-lock { font-size: 11px; color: var(--c-text3); margin-top: 10px; display: flex; align-items: center; gap: 5px; }

/* ---- MODAL ---- */
.mo {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 16px;
  backdrop-filter: blur(8px);
}
.mo.open { display: flex; }
.modal {
  background: var(--c-surface);
  border: 1px solid var(--c-border2);
  border-radius: 16px;
  padding: 24px;
  width: 480px;
  max-width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn .2s cubic-bezier(.34,1.2,.64,1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(12px); }
  to   { opacity: 1; transform: none; }
}
.m-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 18px;
  letter-spacing: -.01em;
}
.fg { margin-bottom: 13px; }
.fl {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--c-text3);
  margin-bottom: 6px;
}
.fi, .fs, .ft {
  width: 100%;
  background: var(--c-surface2);
  border: 1px solid var(--c-border2);
  border-radius: var(--r);
  padding: 9px 12px;
  color: var(--c-text);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.fi:focus, .ft:focus { border-color: var(--c-accent); }
.ft { resize: vertical; min-height: 70px; }
.fa { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.co {
  width: 26px; height: 26px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
}
.co.sel { border-color: white; transform: scale(1.15); }

/* ---- TOAST ---- */
.toast {
  position: fixed;
  bottom: 22px; right: 22px;
  background: var(--c-surface2);
  border: 1px solid var(--c-border2);
  border-radius: var(--r);
  padding: 11px 16px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transform: translateY(70px);
  opacity: 0;
  transition: all .28s cubic-bezier(.34,1.2,.64,1);
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-text3); flex-shrink: 0; }
.toast.ok .toast-dot { background: var(--c-green); }
.toast.err .toast-dot { background: var(--c-red); }

/* ---- RESPONSIVE ---- */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .kanban { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sb { transform: translateX(-100%); }
  .sb.open { transform: none; }
  .overlay.open { display: block; }
  .sb-close { display: block; }
  .main { margin-left: 0; }
  .hamburger { display: flex; }
  .view { padding: 16px; }
  .dc { padding: 16px; }
  .detail-header { padding: 18px 16px; }
  .topbar { padding: 0 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .proj-grid { grid-template-columns: 1fr; }
  .cv-hero-inner { padding: 80px 24px 40px; grid-template-columns: 1fr; }
  .cv-ring-wrap { width: 100px; height: 100px; }
  .cv-ring-pct { font-size: 24px; }
  .cv-body { padding: 32px 24px; }
  .cv-strip-cell { padding: 16px 18px; }
  .cv-strip-val { font-size: 26px; }
  .cv-footer { padding: 28px 24px; }
  .cv-footer-r { text-align: left; }
  .dh-top { flex-direction: column; }
  .dh-pbar { width: 100%; margin-left: 0; }
}
/* ---- PLANNING ---- */
.plan-week {
  display: grid;
  grid-template-columns: 140px repeat(7, 1fr);
  gap: 0;
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 24px;
  background: var(--c-surface);
}
.plan-header-cell {
  background: var(--c-surface2);
  border-bottom: 1px solid var(--c-border);
  border-right: 1px solid var(--c-border);
  padding: 12px 10px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--c-text3);
}
.plan-header-cell.today { color: var(--c-accent); background: rgba(201,168,108,.05); }
.plan-row-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--c-border);
  border-right: 1px solid var(--c-border);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-text2);
  background: var(--c-surface2);
}
.plan-row-label:last-child { border-bottom: none; }
.plan-cell {
  border-bottom: 1px solid var(--c-border);
  border-right: 1px solid var(--c-border);
  min-height: 64px;
  padding: 6px;
  position: relative;
  cursor: pointer;
  transition: background .15s;
}
.plan-cell:hover { background: rgba(255,255,255,.02); }
.plan-cell.today { background: rgba(201,168,108,.03); }
.plan-cell:last-child { border-right: none; }
.plan-block {
  border-radius: 4px;
  padding: 4px 7px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  transition: opacity .15s;
  position: relative;
}
.plan-block:hover { opacity: .85; }
.plan-block-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.plan-block-h { font-size: 9px; opacity: .7; white-space: nowrap; }
.plan-add-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--c-border2);
  opacity: 0;
  transition: opacity .15s;
}
.plan-cell:hover .plan-add-btn { opacity: 1; }
/* Summary cards */
.plan-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.plan-proj-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  border-left: 3px solid var(--pc);

  align-items: center;
  justify-content: space-between;
}
.plan-proj-name { font-size: 13px; font-weight: 600; color: var(--c-text); margin-bottom: 3px; }
.plan-proj-h { font-size: 11px; color: var(--c-text3); }
.plan-proj-badge {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--pc);
}
/* Charge bar */
.charge-bar-wrap { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--r-lg); padding: 16px 20px; margin-bottom: 20px; }
.charge-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--c-text2); margin-bottom: 10px; }
.charge-track { height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
.charge-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.charge-ok   { background: var(--c-green); }
.charge-mid  { background: var(--c-amber); }
.charge-over { background: var(--c-red); }

@media print { .no-print { display: none!important; } body { background: white!important; } }

};

// ============================================================
//  SYNC
// ============================================================
function setSync(s) {
  var d = document.getElementById('syncdot');
  if (!d) return;
  d.className = 'sync-dot' + (s === 'ing' ? ' syncing' : s === 'err' ? ' error' : '');
  d.title = s === 'ok' ? 'Synchronisé' : s === 'ing' ? 'Synchronisation…' : 'Erreur de sync';
}

function save() {
  try { localStorage.setItem('hamouni_wos', JSON.stringify({ projects: S.projects, ts: Date.now() })); } catch(e) {}
  if (USE_CLOUD) push();
  else setSync('ok');
}

function loadLocal() {
  try {
    var d = localStorage.getItem('hamouni_wos');
    if (d) { S.projects = JSON.parse(d).projects; return true; }
  } catch(e) {}
  return false;
}

function push() {
  setSync('ing');
  fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Versioning': 'false' },
    body: JSON.stringify({ projects: S.projects, ts: Date.now() })
  }).then(function(r) {
    setSync(r.ok ? 'ok' : 'err');
    if (!r.ok) showToast('Erreur de synchronisation', false);
  }).catch(function() { setSync('err'); });
}

function pull(cb) {
  fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN + '/latest', {
    headers: { 'X-Master-Key': JSONBIN_KEY }
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.record && d.record.projects) {
      S.projects = d.record.projects;
      try { localStorage.setItem('hamouni_wos', JSON.stringify({ projects: S.projects, ts: Date.now() })); } catch(e) {}
    }
    if (cb) cb();
  }).catch(function() { if (cb) cb(); });
}

function gv(n) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(x) { x.classList.remove('active'); });
  document.getElementById('view-' + n).classList.add('active');
  if (n === 'dashboard') { renderDash(); document.querySelectorAll('.nav-item')[0].classList.add('active'); }
  else if (n === 'projects') { renderAll(); document.querySelectorAll('.nav-item')[1].classList.add('active'); }
  else if (n === 'planning') { renderPlanning(); document.querySelectorAll('.nav-item')[2].classList.add('active'); }
}
function op(id) { S.cur = id; S.tab = 'overview'; gv('project-detail'); renderDetail(id); }
function goBack() { gv('projects'); }
function openSB() { document.getElementById('sb').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeSB() { document.getElementById('sb').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ============================================================
//  DASHBOARD
// ============================================================
function renderDash() {
  var allT = S.projects.reduce(function(a, p) { return a.concat(p.tasks); }, []);
  var done = allT.filter(function(t) { return t.status === 'done'; }).length;
  var urg  = S.projects.filter(function(p) { return p.status === 'urgent'; }).length;

  document.getElementById('stats').innerHTML =
    stat('hi', 'Projets', S.projects.length, '') +
    stat('', 'En cours', S.projects.filter(function(p) { return p.status === 'active'; }).length, '') +
    stat('', '<span style="color:var(--c-red)">Urgent</span>', '<span style="color:var(--c-red)">' + urg + '</span>', '') +
    stat('', 'Tâches complétées', done + '/' + allT.length, (allT.length ? Math.round(done / allT.length * 100) : 0) + '% done');

  document.getElementById('dash-proj').innerHTML = S.projects.map(pcHTML).join('');
  document.getElementById('sb-projects').innerHTML = S.projects.map(function(p) {
    return '<div class="nav-item" onclick="op(\'' + p.id + '\');closeSB()">'
      + '<div class="p-dot" style="background:' + p.color + '"></div>' + p.name + '</div>';
  }).join('');
}

function stat(cls, lbl, val, sub) {
  return '<div class="stat ' + cls + '"><div class="stat-lbl">' + lbl + '</div><div class="stat-val">' + val + '</div><div class="stat-sub">' + sub + '</div></div>';
}

function renderAll() {
  document.getElementById('all-proj').innerHTML = S.projects.map(pcHTML).join('');
}

function pcHTML(p) {
  var done = p.tasks.filter(function(t) { return t.status === 'done'; }).length;
  var pct  = p.tasks.length ? Math.round(done / p.tasks.length * 100) : 0;
  var s    = SM[p.status];
  return '<div class="pc" style="--pc-color:' + p.color + '" onclick="op(\'' + p.id + '\')">'
    + '<div class="pc-top"><div><div class="pc-name">' + p.name + '</div><div class="pc-client">' + p.client + '</div></div><span class="badge ' + s.c + '">' + s.l + '</span></div>'
    + '<div class="pc-desc">' + (p.desc.length > 90 ? p.desc.slice(0,90) + '…' : p.desc) + '</div>'
    + '<div class="pc-progress"><div class="pc-pbar-top"><span>Avancement</span><span>' + pct + '%</span></div><div class="pbar"><div class="pbar-fill" style="width:' + pct + '%"></div></div></div>'
    + '<div class="pc-meta"><div class="pc-meta-i">' + done + '/' + p.tasks.length + ' tâches</div>'
    + (p.instagram ? '<div class="pc-meta-i accent">' + p.instagram + '</div>' : '')
    + '<div class="pc-meta-i" style="margin-left:auto">' + p.deadline + '</div></div>'
    + '</div>';
}

// ============================================================
//  DETAIL
// ============================================================
function renderDetail(id) {
  var p = S.projects.find(function(x) { return x.id === id; });
  if (!p) return;
  var done = p.tasks.filter(function(t) { return t.status === 'done'; }).length;
  var pct  = p.tasks.length ? Math.round(done / p.tasks.length * 100) : 0;
  var s    = SM[p.status];
  var tabs = ['overview', 'tasks', 'etapes', 'rapport', 'notes'];
  var tls  = ['Vue générale', 'Tâches', 'Étapes', 'Rapport', 'Notes'];

  document.getElementById('dta').innerHTML =
    '<button class="btn btn-ghost btn-sm no-print" onclick="openEP(\'' + p.id + '\')">Modifier</button>';

  var hero = '<div class="detail-header" style="border-top:2px solid ' + p.color + '">';
  hero += '<div class="dh-top">';
  hero += '<div><div class="dh-meta"><span class="badge ' + s.c + '">' + s.l + '</span><span style="font-size:11px;color:var(--c-text3)">' + p.deadline + '</span>' + (p.instagram ? '<span style="font-size:11px;color:var(--c-accent)">' + p.instagram + '</span>' : '') + '</div><div class="dh-title">' + p.name + '</div><div class="dh-client">' + p.client + '</div></div>';
  hero += '<div class="dh-progress"><div class="dh-pct" style="color:' + p.color + '">' + pct + '%</div><div class="dh-pct-label">Complété</div><div class="dh-pbar pbar" style="--pc-color:' + p.color + '"><div class="pbar-fill" style="width:' + pct + '%"></div></div></div>';
  hero += '</div>';
  hero += '<div class="tab-bar">' + tabs.map(function(t, i) { return '<div class="tab ' + (t === S.tab ? 'active' : '') + '" onclick="switchTab(\'' + id + '\',\'' + t + '\',this)">' + tls[i] + '</div>'; }).join('') + '</div>';
  hero += '</div>';

  var panels = '<div class="dc">';
  panels += '<div class="tp ' + (S.tab === 'overview'  ? 'active' : '') + '" data-tab="overview">'  + renderOverview(p) + '</div>';
  panels += '<div class="tp ' + (S.tab === 'tasks'     ? 'active' : '') + '" data-tab="tasks">'     + renderTasks(p)    + '</div>';
  panels += '<div class="tp ' + (S.tab === 'etapes'    ? 'active' : '') + '" data-tab="etapes">'    + renderEtapes(p)   + '</div>';
  panels += '<div class="tp ' + (S.tab === 'rapport'   ? 'active' : '') + '" data-tab="rapport">'   + renderRapport(p)  + '</div>';
  panels += '<div class="tp ' + (S.tab === 'notes'     ? 'active' : '') + '" data-tab="notes">'     + renderNotes(p)    + '</div>';
  panels += '</div>';

  document.getElementById('pdc').innerHTML = hero + panels;
}

function renderOverview(p) {
  var done = p.tasks.filter(function(t) { return t.status === 'done'; }).length;
  var prog = p.tasks.filter(function(t) { return t.status === 'inprogress'; }).length;
  var todo = p.tasks.filter(function(t) { return t.status === 'todo'; }).length;
  return '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">'
    + stat('', '<span style="color:var(--c-green)">Terminé</span>', '<span style="color:var(--c-green)">' + done + '</span>', '')
    + stat('', '<span style="color:var(--c-blue)">En cours</span>', '<span style="color:var(--c-blue)">' + prog + '</span>', '')
    + stat('', 'À faire', todo, '')
    + '</div>'
    + '<div class="notes-wrap"><div style="font-size:12px;font-weight:500;color:var(--c-text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Description</div><div style="font-size:13px;color:var(--c-text2);line-height:1.8">' + p.desc + '</div></div>';
}

function renderTasks(p) {
  var cols   = ['todo', 'inprogress', 'done'];
  var lbls   = ['À faire', 'En cours', 'Terminé'];
  var clrs   = ['var(--c-text3)', 'var(--c-blue)', 'var(--c-green)'];
  var html = '<div class="hint-bar">💡 Clique sur le cercle pour changer le statut · Survole pour modifier ou supprimer</div>';
  html += '<div class="kanban">';
  cols.forEach(function(s, i) {
    var tasks = p.tasks.filter(function(t) { return t.status === s; });
    html += '<div class="k-col"><div class="k-col-head"><span class="k-col-title" style="color:' + clrs[i] + '">' + lbls[i] + '</span><span class="k-col-count">' + tasks.length + '</span></div>';
    tasks.forEach(function(t) { html += tCard(t, p.id); });
    html += '<button class="add-row" onclick="openAddTask()"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter</button></div>';
  });
  return html + '</div>';
}

function tCard(t, pid) {
  var c  = TC[t.tag] || TC.other;
  var nl = t.status === 'todo' ? '→ En cours' : t.status === 'inprogress' ? '✓ Terminé' : '↩ Réouvrir';
  var bc = t.status === 'done' ? 'done' : t.status === 'inprogress' ? 'prog' : '';
  var bi = t.status === 'done' ? '✓' : t.status === 'inprogress' ? '●' : '';
  return '<div class="t-card"><div class="t-card-top">'
    + '<div class="t-circle ' + bc + '" onclick="cycleT(\'' + pid + '\',\'' + t.id + '\')" title="' + nl + '">' + bi + '</div>'
    + '<div class="t-name ' + (t.status === 'done' ? 'struck' : '') + '">' + t.name + '</div></div>'
    + (t.note ? '<div class="t-note">↳ ' + t.note + '</div>' : '')
    + '<div class="t-footer">'
    + '<span class="t-tag" style="background:' + c.bg + ';color:' + c.t + '">' + t.tag + '</span>'
    + '<button class="ic-btn" onclick="openEditTask(\'' + pid + '\',\'' + t.id + '\')">Modifier</button>'
    + '<button class="ic-btn red" onclick="delTask(\'' + pid + '\',\'' + t.id + '\')">Supprimer</button>'
    + '<span style="font-size:10px;color:var(--c-text3);margin-left:auto">' + nl + '</span>'
    + '</div></div>';
}

function renderEtapes(p) {
  var html = '<div class="hint-bar">💡 Clique sur le cercle pour changer l\'état · Survole pour modifier ou supprimer</div>';
  if (!p.etapes || !p.etapes.length) html += '<div style="color:var(--c-text3);padding:14px;font-size:13px">Aucune étape. Ajoute-en une !</div>';
  else {
    html += '<div class="etape-list">';
    p.etapes.forEach(function(e, i) {
      var isLast = i === p.etapes.length - 1;
      var dc = e.status === 'done' ? 'var(--c-green)' : e.status === 'current' ? p.color : 'transparent';
      var bc = e.status === 'done' ? 'done' : e.status === 'current' ? 'curr' : '';
      var bi = e.status === 'done' ? '✓' : e.status === 'current' ? '●' : '';
      var nl = e.status === 'todo' ? '→ En cours' : e.status === 'current' ? '✓ Terminé' : '↩ À venir';
      var sc = e.status === 'done' ? 'es-done' : e.status === 'current' ? 'es-curr' : 'es-todo';
      var sl = e.status === 'done' ? '✓ Terminé' : e.status === 'current' ? '● En cours' : '○ À venir';
      html += '<div class="etape-item"><div class="etape-track"><div class="etape-dot ' + bc + '" onclick="cycleE(\'' + p.id + '\',\'' + e.id + '\')" title="' + nl + '" style="color:' + (e.status === 'done' ? '#fff' : 'transparent') + '">' + bi + '</div>' + (!isLast ? '<div class="etape-line"></div>' : '') + '</div>';
      html += '<div class="etape-card ' + (e.status === 'current' ? 'curr-card' : '') + '"><div class="etape-date">' + e.date + '</div><div class="etape-name">' + e.name + '</div>' + (e.desc ? '<div class="etape-desc">' + e.desc + '</div>' : '') + '<span class="etape-status ' + sc + '">' + sl + '</span>';
      html += '<div class="etape-acts"><button class="ic-btn" onclick="openEditEtape(\'' + p.id + '\',\'' + e.id + '\')">Modifier</button><button class="ic-btn red" onclick="delEtape(\'' + p.id + '\',\'' + e.id + '\')">Supprimer</button><span style="font-size:10px;color:var(--c-text3);margin-left:auto">' + nl + '</span></div>';
      html += '</div></div>';
    });
    html += '</div>';
  }
  html += '<button class="add-row" style="margin-top:8px" onclick="openAddEtape()"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter une étape</button>';
  return html;
}

function renderRapport(p) {
  var now = new Date();
  var mos = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var moisNom = mos[now.getMonth()] + ' ' + now.getFullYear();
  var done = p.tasks.filter(function(t) { return t.status === 'done'; });
  var prog = p.tasks.filter(function(t) { return t.status === 'inprogress'; });
  var todo = p.tasks.filter(function(t) { return t.status === 'todo'; });
  var pct  = p.tasks.length ? Math.round(done.length / p.tasks.length * 100) : 0;
  var ec   = (p.etapes || []).filter(function(e) { return e.status === 'current'; });

  var h = '<div class="rapport-wrap">';
  h += '<div class="rapport-header-block"><div><div class="rapport-title">' + p.name + '</div><div class="rapport-sub">' + p.client + ' · Rapport ' + moisNom + '</div></div><div style="text-align:right"><div class="rapport-pct" style="color:' + p.color + '">' + pct + '%</div><div style="font-size:11px;color:var(--c-text3);margin-top:3px">Avancement global</div></div></div>';

  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">'
    + stat('', '<span style="color:var(--c-green)">Terminées</span>', '<span style="color:var(--c-green)">' + done.length + '</span>', '')
    + stat('', '<span style="color:var(--c-blue)">En cours</span>', '<span style="color:var(--c-blue)">' + prog.length + '</span>', '')
    + stat('', 'À faire', todo.length, '') + '</div>';

  if (done.length) {
    h += '<div class="rapport-section"><div class="rapport-sh">Ce qu\'on a réalisé</div>';
    done.forEach(function(t) { var c = TC[t.tag] || TC.other; h += '<div class="rapport-row"><div class="rapport-dot" style="background:var(--c-green)"></div><span style="flex:1">' + t.name + '</span><span class="t-tag" style="background:' + c.bg + ';color:' + c.t + '">' + t.tag + '</span></div>'; });
    h += '</div>';
  }
  if (prog.length) {
    h += '<div class="rapport-section"><div class="rapport-sh">En cours de réalisation</div>';
    prog.forEach(function(t) { var c = TC[t.tag] || TC.other; h += '<div class="rapport-row"><div class="rapport-dot" style="background:var(--c-blue)"></div><span style="flex:1">' + t.name + (t.note ? ' <span style="font-size:11px;color:var(--c-text3);font-style:italic">— ' + t.note + '</span>' : '') + '</span><span class="t-tag" style="background:' + c.bg + ';color:' + c.t + '">' + t.tag + '</span></div>'; });
    h += '</div>';
  }
  if (ec.length) {
    h += '<div class="rapport-section"><div class="rapport-sh">Étape actuelle</div>';
    ec.forEach(function(e) { h += '<div class="rapport-row"><div class="rapport-dot" style="background:' + p.color + '"></div><div style="flex:1"><div>' + e.name + '</div>' + (e.desc ? '<div style="font-size:11px;color:var(--c-text3)">' + e.desc + '</div>' : '') + '</div><span style="font-size:11px;color:var(--c-text3)">' + e.date + '</span></div>'; });
    h += '</div>';
  }
  if (todo.length) {
    h += '<div class="rapport-section"><div class="rapport-sh">Prochaines actions</div>';
    todo.slice(0, 5).forEach(function(t) { h += '<div class="rapport-row"><div class="rapport-dot" style="background:var(--c-text3)"></div><span>' + t.name + '</span></div>'; });
    if (todo.length > 5) h += '<div style="font-size:11px;color:var(--c-text3);padding:8px 14px">+ ' + (todo.length - 5) + ' autres à venir</div>';
    h += '</div>';
  }

  h += '<div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">';
  h += '<div style="font-size:11px;color:var(--c-text3)">HAMOUNI Studio · Ayoub HAMOUNI · @hamouni.ay</div>';
  h += '<div style="display:flex;gap:8px" class="no-print"><button class="btn btn-ghost btn-sm" onclick="window.print()">Imprimer / PDF</button></div>';
  h += '</div></div>';
  return h;
}

function renderNotes(p) {
  return '<div class="notes-wrap"><textarea class="notes-ta" placeholder="Notes internes, idées, remarques… (jamais visibles par le client)" onchange="saveNote(\'' + p.id + '\',this.value)">' + (p.notes || '') + '</textarea></div><div class="notes-lock">🔒 Ces notes sont strictement privées — le client ne les voit jamais.</div>';
}

function switchTab(pid, tab, el) {
  S.tab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.tp').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('.tp[data-tab="' + tab + '"]').classList.add('active');
}

// ============================================================
//  TASK ACTIONS
// ============================================================
function cycleT(pid, tid) {
  var p = S.projects.find(function(x) { return x.id === pid; }); if (!p) return;
  var t = p.tasks.find(function(x) { return x.id === tid; }); if (!t) return;
  var c = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
  t.status = c[t.status];
  save(); renderDetail(pid); renderDash();
  showToast(t.status === 'done' ? 'Tâche terminée ✓' : t.status === 'inprogress' ? 'En cours' : 'Remis à faire', true);
}
function openAddTask() {
  S.editT = null;
  document.getElementById('m-task-title').textContent = 'Nouvelle tâche';
  document.getElementById('t-save').textContent = 'Ajouter';
  document.getElementById('t-name').value = '';
  document.getElementById('t-note').value = '';
  document.getElementById('t-st').value = 'todo';
  om('m-task');
}
function openEditTask(pid, tid) {
  S.editT = tid;
  var p = S.projects.find(function(x) { return x.id === pid; });
  var t = p && p.tasks.find(function(x) { return x.id === tid; }); if (!t) return;
  document.getElementById('m-task-title').textContent = 'Modifier la tâche';
  document.getElementById('t-save').textContent = 'Enregistrer';
  document.getElementById('t-name').value = t.name;
  document.getElementById('t-tag').value  = t.tag;
  document.getElementById('t-st').value   = t.status;
  document.getElementById('t-note').value = t.note || '';
  om('m-task');
}
function saveTask() {
  var name = document.getElementById('t-name').value.trim();
  if (!name) { showToast('Nom requis', false); return; }
  var p = S.projects.find(function(x) { return x.id === S.cur; }); if (!p) return;
  var note = document.getElementById('t-note').value.trim();
  if (S.editT) {
    var t = p.tasks.find(function(x) { return x.id === S.editT; });
    if (t) { t.name = name; t.tag = document.getElementById('t-tag').value; t.status = document.getElementById('t-st').value; t.note = note || null; }
    showToast('Tâche modifiée', true);
  } else {
    p.tasks.push({ id: 't_' + Date.now(), name: name, tag: document.getElementById('t-tag').value, status: document.getElementById('t-st').value, note: note || null });
    showToast('Tâche ajoutée', true);
  }
  save(); cm('m-task'); renderDetail(S.cur); renderDash();
}
function delTask(pid, tid) {
  if (!confirm('Supprimer cette tâche ?')) return;
  var p = S.projects.find(function(x) { return x.id === pid; }); if (!p) return;
  p.tasks = p.tasks.filter(function(x) { return x.id !== tid; });
  save(); renderDetail(pid); renderDash(); showToast('Supprimée', true);
}

// ============================================================
//  ÉTAPE ACTIONS
// ============================================================
function cycleE(pid, eid) {
  var p = S.projects.find(function(x) { return x.id === pid; }); if (!p) return;
  var e = p.etapes.find(function(x) { return x.id === eid; }); if (!e) return;
  var c = { todo: 'current', current: 'done', done: 'todo' };
  e.status = c[e.status];
  save(); renderDetail(pid);
  showToast('Étape → ' + (e.status === 'done' ? 'Terminée ✓' : e.status === 'current' ? 'En cours' : 'À venir'), true);
}
function openAddEtape() {
  S.editE = null;
  document.getElementById('m-etape-title').textContent = 'Nouvelle étape';
  document.getElementById('e-save').textContent = 'Ajouter';
  ['e-name','e-date','e-desc'].forEach(function(x) { document.getElementById(x).value = ''; });
  document.getElementById('e-st').value = 'todo';
  om('m-etape');
}
function openEditEtape(pid, eid) {
  S.editE = eid;
  var p = S.projects.find(function(x) { return x.id === pid; });
  var e = p && p.etapes.find(function(x) { return x.id === eid; }); if (!e) return;
  document.getElementById('m-etape-title').textContent = 'Modifier l\'étape';
  document.getElementById('e-save').textContent = 'Enregistrer';
  document.getElementById('e-name').value = e.name;
  document.getElementById('e-date').value = e.date;
  document.getElementById('e-desc').value = e.desc || '';
  document.getElementById('e-st').value   = e.status;
  om('m-etape');
}
function saveEtape() {
  var name = document.getElementById('e-name').value.trim();
  var date = document.getElementById('e-date').value.trim();
  if (!name || !date) { showToast('Titre et date requis', false); return; }
  var p = S.projects.find(function(x) { return x.id === S.cur; }); if (!p) return;
  if (!p.etapes) p.etapes = [];
  var desc = document.getElementById('e-desc').value.trim();
  var status = document.getElementById('e-st').value;
  if (S.editE) {
    var e = p.etapes.find(function(x) { return x.id === S.editE; });
    if (e) { e.name = name; e.date = date; e.desc = desc || null; e.status = status; }
    showToast('Étape modifiée', true);
  } else {
    p.etapes.push({ id: 'e_' + Date.now(), name: name, date: date, desc: desc || null, status: status });
    showToast('Étape ajoutée', true);
  }
  save(); cm('m-etape'); renderDetail(S.cur);
}
function delEtape(pid, eid) {
  if (!confirm('Supprimer cette étape ?')) return;
  var p = S.projects.find(function(x) { return x.id === pid; }); if (!p) return;
  p.etapes = p.etapes.filter(function(x) { return x.id !== eid; });
  save(); renderDetail(pid); showToast('Étape supprimée', true);
}

// ============================================================
//  PLANNING
// ============================================================
var _planOffset = 0; // weeks from today

function getWeekDays(offset) {
  var now = new Date();
  var day = now.getDay(); // 0=Sun, 1=Mon...
  var monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
  monday.setHours(0,0,0,0);
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function formatDate(d) {
  return d.getDate() + '/' + (d.getMonth()+1);
}

function isToday(d) {
  var n = new Date();
  return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}

function dayKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function prevWeek() { _planOffset--; renderPlanning(); }
function nextWeek() { _planOffset++; renderPlanning(); }
function goToday()  { _planOffset = 0; renderPlanning(); }

function renderPlanning() {
  var days = getWeekDays(_planOffset);
  var dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  // Load planning data from localStorage
  var planData = {};
  try { planData = JSON.parse(localStorage.getItem('hamouni_plan') || '{}'); } catch(e) {}

  // Update week label
  var lbl = document.getElementById('week-label');
  if (lbl) {
    if (_planOffset === 0) lbl.textContent = 'Cette semaine';
    else lbl.textContent = formatDate(days[0]) + ' — ' + formatDate(days[6]) + ' ' + days[0].getFullYear();
  }

  // Compute total hours per project this week
  var projHours = {};
  S.projects.forEach(function(p) { projHours[p.id] = 0; });
  days.forEach(function(d) {
    var key = dayKey(d);
    if (planData[key]) {
      planData[key].forEach(function(block) {
        if (projHours[block.pid] !== undefined) projHours[block.pid] += block.hours;
        else projHours[block.pid] = block.hours;
      });
    }
  });

  var totalHours = Object.values(projHours).reduce(function(a,b){return a+b;}, 0);
  var maxHours = 40; // 5 days × 8h
  var chargeClass = totalHours <= 30 ? 'charge-ok' : totalHours <= 40 ? 'charge-mid' : 'charge-over';
  var chargeLabel = totalHours <= 30 ? 'Charge normale' : totalHours <= 40 ? 'Semaine chargée' : '⚠️ Surchargé';

  var html = '';

  // Charge bar
  html += '<div class="charge-bar-wrap">';
  html += '<div class="charge-bar-label"><span>Charge de la semaine — ' + chargeLabel + '</span><span style="font-weight:600">' + totalHours + 'h / ' + maxHours + 'h</span></div>';
  html += '<div class="charge-track"><div class="charge-fill ' + chargeClass + '" style="width:' + Math.min(100, Math.round(totalHours/maxHours*100)) + '%"></div></div>';
  html += '</div>';

  // Summary cards per project
  html += '<div class="plan-summary">';
  S.projects.forEach(function(p) {
    var h = projHours[p.id] || 0;
    html += '<div class="plan-proj-card" style="--pc:' + p.color + '">';
    html += '<div><div class="plan-proj-name">' + p.name + '</div><div class="plan-proj-h">' + h + 'h cette semaine</div></div>';
    html += '<div class="plan-proj-badge">' + h + 'h</div>';
    html += '</div>';
  });
  html += '</div>';

  // Week grid
  html += '<div class="plan-week">';
  // Header row
  html += '<div class="plan-header-cell" style="font-size:10px;color:var(--c-text3)">Projet</div>';
  days.forEach(function(d, i) {
    var todayCls = isToday(d) ? ' today' : '';
    html += '<div class="plan-header-cell' + todayCls + '">' + dayNames[i] + '<br><span style="font-size:13px;font-weight:700;letter-spacing:0">' + d.getDate() + '</span></div>';
  });

  // One row per project
  S.projects.forEach(function(p) {
    // Row label
    html += '<div class="plan-row-label"><div class="p-dot" style="background:' + p.color + '"></div>' + p.name + '</div>';
    // Day cells
    days.forEach(function(d) {
      var key = dayKey(d);
      var blocks = (planData[key] || []).filter(function(b) { return b.pid === p.id; });
      var todayCls = isToday(d) ? ' today' : '';
      html += '<div class="plan-cell' + todayCls + '" onclick="addBlock('' + p.id + '','' + key + '')">';
      blocks.forEach(function(b) {
        html += '<div class="plan-block" style="background:' + p.color + '" onclick="event.stopPropagation();editBlock('' + key + '','' + b.id + '')">';
        html += '<span class="plan-block-name">' + (b.label || p.name) + '</span>';
        html += '<span class="plan-block-h">' + b.hours + 'h</span>';
        html += '</div>';
      });
      if (!blocks.length) html += '<div class="plan-add-btn">+</div>';
      html += '</div>';
    });
  });
  html += '</div>';

  // Pro tips
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:4px">';
  html += '<div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:16px 18px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text3);margin-bottom:8px">💡 Comment utiliser</div><div style="font-size:12px;color:var(--c-text3);line-height:1.7">Clique sur une cellule pour ajouter un bloc de travail. Donne-toi <strong style="color:var(--c-text2)">un seul projet prioritaire</strong> par demi-journée.</div></div>';
  html += '<div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:16px 18px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text3);margin-bottom:8px">🎯 Règle des 3</div><div style="font-size:12px;color:var(--c-text3);line-height:1.7">Chaque matin, choisis <strong style="color:var(--c-text2)">3 tâches max</strong> à finir dans la journée. Rien d'autre ne compte.</div></div>';
  html += '</div>';

  document.getElementById('planning-content').innerHTML = html;
}

function savePlanData(data) {
  localStorage.setItem('hamouni_plan', JSON.stringify(data));
}

function addBlock(pid, dateKey) {
  var p = S.projects.find(function(x) { return x.id === pid; });
  if (!p) return;

  // Quick modal
  var label = prompt('Que vas-tu faire sur "' + p.name + '" ? (laisse vide pour juste mettre des heures)');
  if (label === null) return; // cancelled
  var hoursStr = prompt('Combien d'heures ? (ex: 2, 3.5)', '2');
  if (hoursStr === null) return;
  var hours = parseFloat(hoursStr);
  if (isNaN(hours) || hours <= 0) { alert('Nombre d'heures invalide'); return; }

  var planData = {};
  try { planData = JSON.parse(localStorage.getItem('hamouni_plan') || '{}'); } catch(e) {}
  if (!planData[dateKey]) planData[dateKey] = [];
  planData[dateKey].push({ id: 'b_' + Date.now(), pid: pid, label: label || p.name, hours: hours });
  savePlanData(planData);
  renderPlanning();
  showToast(hours + 'h planifiées sur ' + p.name, true);
}

function editBlock(dateKey, blockId) {
  var planData = {};
  try { planData = JSON.parse(localStorage.getItem('hamouni_plan') || '{}'); } catch(e) {}
  if (!planData[dateKey]) return;
  var block = planData[dateKey].find(function(b) { return b.id === blockId; });
  if (!block) return;

  var action = prompt('Bloc : "' + block.label + '" — ' + block.hours + 'h

Entrer une nouvelle durée (en heures) ou "supprimer" pour effacer', block.hours);
  if (action === null) return;
  if (action.trim().toLowerCase() === 'supprimer') {
    planData[dateKey] = planData[dateKey].filter(function(b) { return b.id !== blockId; });
    if (!planData[dateKey].length) delete planData[dateKey];
    savePlanData(planData);
    renderPlanning();
    showToast('Bloc supprimé', true);
  } else {
    var h = parseFloat(action);
    if (!isNaN(h) && h > 0) {
      block.hours = h;
      savePlanData(planData);
      renderPlanning();
      showToast('Mis à jour', true);
    }
  }
}
