<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio AY — Project Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0A;
  --bg2: #111111;
  --bg3: #181818;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #F0EDE8;
  --text2: #888882;
  --text3: #555550;
  --accent: #C9A86C;
  --accent2: #E8D5A3;
  --accent-dim: rgba(201,168,108,0.12);
  --red: #E05C5C;
  --green: #5CAF8A;
  --blue: #5B8FD4;
  --purple: #9B7FD4;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
.serif { font-family: 'DM Serif Display', serif; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform 0.3s; }
.main { margin-left: 260px; flex: 1; min-height: 100vh; }

/* SIDEBAR */
.sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
.logo-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); letter-spacing: 0.02em; }
.logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
.sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
.nav-section { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 12px 12px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13.5px; color: var(--text2); transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item .icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
.nav-item.active .icon { opacity: 1; }
.project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
.user-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); background: var(--bg3); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #000; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 500; }
.user-role { font-size: 11px; color: var(--text3); }

/* TOP BAR */
.topbar { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 18px; font-weight: 500; color: var(--text); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* VIEWS */
.view { display: none; padding: 32px; }
.view.active { display: block; }

/* DASHBOARD */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; }
.stat-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 300; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.stat-card.accent-card { border-color: rgba(201,168,108,0.3); background: var(--accent-dim); }
.stat-card.accent-card .stat-value { color: var(--accent); }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.section-title { font-size: 15px; font-weight: 500; }

/* PROJECT CARDS */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--project-color); }
.project-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.pc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.pc-name { font-size: 15px; font-weight: 500; color: var(--text); }
.pc-client { font-size: 12px; color: var(--text3); margin-top: 2px; }
.status-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; letter-spacing: 0.04em; white-space: nowrap; }
.status-active { background: rgba(92,175,138,0.15); color: var(--green); }
.status-pending { background: rgba(91,143,212,0.15); color: var(--blue); }
.status-urgent { background: rgba(224,92,92,0.15); color: var(--red); }
.status-planning { background: rgba(155,127,212,0.15); color: var(--purple); }
.pc-progress { margin: 14px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.progress-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--project-color); transition: width 0.5s; }
.pc-meta { display: flex; gap: 14px; }
.pc-meta-item { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.pc-meta-item svg { width: 12px; height: 12px; }

/* PROJECT DETAIL PAGE */
.project-detail { display: none; }
.project-detail.active { display: block; }
.detail-hero { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 32px; }
.detail-hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; padding: 6px 10px; border-radius: var(--radius-sm); transition: all 0.15s; }
.back-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.detail-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); }
.detail-client { font-size: 15px; color: var(--text2); margin-top: 4px; }
.detail-tabs { display: flex; gap: 4px; margin-top: 24px; }
.tab { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.tab.active { background: var(--accent-dim); color: var(--accent); }
.detail-content { padding: 32px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* TASKS / KANBAN */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kanban-col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.kanban-col-title { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.kanban-col-count { background: rgba(255,255,255,0.06); color: var(--text2); font-size: 11px; padding: 1px 7px; border-radius: 10px; }
.task-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.task-item:hover { border-color: var(--border2); }
.task-name { font-size: 13px; color: var(--text); margin-bottom: 6px; }
.task-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-right: 4px; }
.add-task-btn { width: 100%; padding: 8px; border-radius: var(--radius-sm); border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; margin-top: 4px; }
.add-task-btn:hover { color: var(--text2); border-color: var(--border); background: rgba(255,255,255,0.03); }

/* MILESTONES */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 1px; background: var(--border); }
.milestone { position: relative; margin-bottom: 20px; }
.milestone::before { content: ''; position: absolute; left: -20px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg); border: 2px solid var(--border2); }
.milestone.done::before { background: var(--green); border-color: var(--green); }
.milestone.current::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.milestone-date { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.milestone-name { font-size: 14px; color: var(--text); font-weight: 500; }
.milestone-desc { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* MARKETING STRATEGY */
.strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.strategy-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.strategy-card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.strategy-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); display: flex; align-items: flex-start; gap: 8px; }
.strategy-item:last-child { border-bottom: none; }
.strategy-item::before { content: '→'; color: var(--accent); font-size: 12px; margin-top: 1px; flex-shrink: 0; }
.strategy-full { grid-column: 1 / -1; }

/* CONTENT CALENDAR */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
.cal-header { text-align: center; font-size: 11px; color: var(--text3); padding: 8px 4px; }
.cal-day { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px; min-height: 60px; position: relative; cursor: pointer; transition: all 0.15s; }
.cal-day:hover { border-color: var(--border2); }
.cal-day-num { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.cal-post { font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; line-height: 1.3; }
.post-ig { background: rgba(201,168,108,0.15); color: var(--accent); }
.post-li { background: rgba(91,143,212,0.15); color: var(--blue); }
.post-tt { background: rgba(92,175,138,0.15); color: var(--green); }

/* SHARING / CLIENT VIEW */
.share-bar { background: linear-gradient(135deg, var(--accent-dim), rgba(91,143,212,0.08)); border: 1px solid rgba(201,168,108,0.2); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.share-text { font-size: 13px; color: var(--text2); }
.share-link { font-size: 12px; color: var(--accent); font-family: monospace; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 4px; }

/* FILES SECTION */
.files-list { display: grid; gap: 8px; }
.file-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.file-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.file-name { font-size: 13px; color: var(--text); }
.file-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.file-action { margin-left: auto; font-size: 12px; color: var(--text3); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; }
.file-action:hover { color: var(--text); background: rgba(255,255,255,0.05); }

/* NOTES */
.notes-area { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.notes-textarea { width: 100%; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.8; resize: none; outline: none; min-height: 200px; }
.notes-textarea::placeholder { color: var(--text3); }

/* MODALS */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 500px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: 0.04em; }
.form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--accent); }
.form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
.form-select option { background: var(--bg3); }
.form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: vertical; min-height: 80px; }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.color-selector { display: flex; gap: 8px; }
.color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-opt.selected { border-color: white; transform: scale(1.15); }

/* NOTIFICATION */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(92,175,138,0.4); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .kanban { grid-template-columns: 1fr; }
  .strategy-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">Studio AY</div>
      <div class="logo-sub">Project Manager</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Navigation</div>
      <div class="nav-item active" onclick="showView('dashboard')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tableau de bord
      </div>
      <div class="nav-item" onclick="showView('projects')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        Projets
      </div>
      <div class="nav-item" onclick="showView('calendar')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Calendrier
      </div>

      <div class="nav-section" style="margin-top:8px;">Mes Projets</div>
      <div id="sidebar-projects"></div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">AY</div>
        <div>
          <div class="user-name">Ayoub</div>
          <div class="user-role">Directeur créatif</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- DASHBOARD VIEW -->
    <div id="view-dashboard" class="view active">
      <div class="topbar">
        <div class="topbar-title">Tableau de bord</div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openNewProjectModal()">+ Nouveau projet</button>
        </div>
      </div>
      <div style="padding:32px;">
        <div class="stats-row" id="stats-row"></div>
        <div class="section-header">
          <div class="section-title">Projets actifs</div>
          <button class="btn btn-ghost" onclick="showView('projects')">Voir tous →</button>
        </div>
        <div class="projects-grid" id="dashboard-projects"></div>
      </div>
    </div>

    <!-- PROJECTS VIEW -->
    <div id="view-projects" class="view">
      <div class="topbar">
        <div class="topbar-title">Tous les projets</div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openNewProjectModal()">+ Nouveau projet</button>
        </div>
      </div>
      <div style="padding:32px;">
        <div class="projects-grid" id="all-projects"></div>
      </div>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="view-calendar" class="view">
      <div class="topbar">
        <div class="topbar-title">Calendrier contenu</div>
        <div class="topbar-actions">
          <button class="btn btn-ghost">Avril 2026</button>
        </div>
      </div>
      <div style="padding:32px;">
        <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
          <span style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></span>Instagram</span>
          <span style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--blue);"></span>LinkedIn</span>
          <span style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);"></span>TikTok</span>
        </div>
        <div class="calendar-grid">
          <div class="cal-header">Lun</div><div class="cal-header">Mar</div><div class="cal-header">Mer</div><div class="cal-header">Jeu</div><div class="cal-header">Ven</div><div class="cal-header">Sam</div><div class="cal-header">Dim</div>
        </div>
        <div class="calendar-grid" id="calendar-body"></div>
      </div>
    </div>

    <!-- PROJECT DETAIL VIEW -->
    <div id="view-project-detail" class="view">
      <div class="topbar">
        <div class="back-btn" onclick="goBack()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Retour
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" onclick="shareProject()">Partager avec client</button>
          <button class="btn btn-primary" onclick="openAddTaskModal()">+ Tâche</button>
        </div>
      </div>
      <div id="project-detail-content"></div>
    </div>
  </main>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal">
    <div class="modal-title">Nouveau projet</div>
    <div class="form-group">
      <label class="form-label">Nom du projet</label>
      <input type="text" class="form-input" id="np-name" placeholder="ex: Grandiose Paris">
    </div>
    <div class="form-group">
      <label class="form-label">Client</label>
      <input type="text" class="form-input" id="np-client" placeholder="Nom du client ou entreprise">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="np-desc" placeholder="Résumé du projet..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Statut</label>
      <select class="form-select" id="np-status">
        <option value="active">En cours</option>
        <option value="planning">Planification</option>
        <option value="pending">En attente</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Couleur</label>
      <div class="color-selector">
        <div class="color-opt selected" style="background:#C9A86C;" data-color="#C9A86C" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#5B8FD4;" data-color="#5B8FD4" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#5CAF8A;" data-color="#5CAF8A" onclick="selectColor(this)"></div>
        <div class="color-opt" style="background:#E05C5C;" data-color="#E05C5C" onclick="selectColor(this)"></div>

// ====== VIEWS ======
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const view = document.getElementById('view-' + name);
  if (view) view.classList.add('active');
  if (name === 'dashboard') { renderDashboard(); document.querySelectorAll('.nav-item')[0].classList.add('active'); }
  else if (name === 'projects') { renderAllProjects(); document.querySelectorAll('.nav-item')[1].classList.add('active'); }
  else if (name === 'calendar') { renderCalendar(); document.querySelectorAll('.nav-item')[2].classList.add('active'); }
}

function openProject(id) {
  state.currentProject = id;
  state.currentTab = 'overview';
  showView('project-detail');
  renderProjectDetail(id);
}

function goBack() {
  showView('projects');
}

// ====== RENDER DASHBOARD ======
function renderDashboard() {
  const total = state.projects.length;
  const active = state.projects.filter(p => p.status === 'active').length;
  const urgent = state.projects.filter(p => p.status === 'urgent').length;
  const totalTasks = state.projects.flatMap(p => p.tasks).length;
  const doneTasks = state.projects.flatMap(p => p.tasks).filter(t => t.status === 'done').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card accent-card"><div class="stat-label">Projets</div><div class="stat-value">${total}</div><div class="stat-sub">total</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value">${active}</div><div class="stat-sub">actifs</div></div>
    <div class="stat-card"><div class="stat-label">Urgent</div><div class="stat-value" style="color:var(--red)">${urgent}</div><div class="stat-sub">à traiter</div></div>
    <div class="stat-card"><div class="stat-label">Tâches complétées</div><div class="stat-value">${doneTasks}/${totalTasks}</div><div class="stat-sub">${Math.round(doneTasks/totalTasks*100)}%</div></div>
  `;
  document.getElementById('dashboard-projects').innerHTML = state.projects.map(p => projectCardHTML(p)).join('');
  renderSidebarProjects();
}

function renderAllProjects() {
  document.getElementById('all-projects').innerHTML = state.projects.map(p => projectCardHTML(p)).join('');
}

function projectCardHTML(p) {
  const done = p.tasks.filter(t => t.status === 'done').length;
  const total = p.tasks.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const s = STATUS_MAP[p.status];
  return `
    <div class="project-card" style="--project-color:${p.color}" onclick="openProject('${p.id}')">
      <div class="pc-header">
        <div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-client">${p.client}</div>
        </div>
        <span class="status-badge ${s.cls}">${s.label}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5;">${p.desc.length > 90 ? p.desc.slice(0,90)+'…' : p.desc}</div>
      <div class="pc-progress">
        <div class="progress-label"><span>Avancement</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="pc-meta">
        <div class="pc-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          ${done}/${total} tâches
        </div>
        <div class="pc-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          ${p.deadline}
        </div>
      </div>
    </div>
  `;
}

function renderSidebarProjects() {
  document.getElementById('sidebar-projects').innerHTML = state.projects.map(p => `
    <div class="nav-item" onclick="openProject('${p.id}')">
      <div class="project-dot" style="background:${p.color}"></div>
      ${p.name}
    </div>
  `).join('');
}

// ====== RENDER PROJECT DETAIL ======
function renderProjectDetail(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const pct = p.tasks.length ? Math.round(p.tasks.filter(t=>t.status==='done').length/p.tasks.length*100) : 0;
  const s = STATUS_MAP[p.status];

  const tabs = ['overview','tasks','milestones','marketing','files','notes'];
  const tabLabels = ['Vue générale','Tâches','Jalons','Stratégie marketing','Fichiers','Notes'];

  document.getElementById('project-detail-content').innerHTML = `
    <div class="detail-hero" style="border-top:3px solid ${p.color}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <span class="status-badge ${s.cls}">${s.label}</span>
            <span style="font-size:12px;color:var(--text3)">Deadline : ${p.deadline}</span>
          </div>
          <div class="detail-title">${p.name}</div>
          <div class="detail-client">Client : ${p.client}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:28px;font-weight:300;color:${p.color}">${pct}%</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">complété</div>
          <div class="progress-bar" style="width:180px;--project-color:${p.color}"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="detail-tabs">
        ${tabs.map((t,i) => `<div class="tab ${t===state.currentTab?'active':''}" onclick="switchTab('${id}','${t}')">${tabLabels[i]}</div>`).join('')}
      </div>
    </div>
    <div class="detail-content">
      ${renderOverviewTab(p)}
      ${renderTasksTab(p)}
      ${renderMilestonesTab(p)}
      ${renderMarketingTab(p)}
      ${renderFilesTab(p)}
      ${renderNotesTab(p)}
    </div>
  `;
  document.querySelector(`.tab-panel[data-tab="${state.currentTab}"]`).classList.add('active');
}

function switchTab(projectId, tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-panel[data-tab="${tab}"]`).classList.add('active');
}

function renderOverviewTab(p) {
  const done = p.tasks.filter(t=>t.status==='done').length;
  const inprog = p.tasks.filter(t=>t.status==='inprogress').length;
  const todo = p.tasks.filter(t=>t.status==='todo').length;
  return `
    <div class="tab-panel" data-tab="overview">
      <div class="share-bar">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;">Partager avec le client</div>
          <div class="share-text">Le client peut suivre l'avancement en temps réel sans modifier quoi que ce soit.</div>
        </div>
        <div>
          <div class="share-link">studio-ay.com/client/${p.id}</div>
          <button class="btn btn-ghost" style="margin-top:8px;font-size:12px;" onclick="shareProject()">Copier le lien</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
        <div class="stat-card"><div class="stat-label">Terminé</div><div class="stat-value" style="color:var(--green)">${done}</div></div>
        <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:var(--blue)">${inprog}</div></div>
        <div class="stat-card"><div class="stat-label">À faire</div><div class="stat-value">${todo}</div></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Description du projet</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.7;">${p.desc}</div>
      </div>
    </div>
  `;
}

function renderTasksTab(p) {
  const cols = [
    { key: 'todo', label: 'À faire' },
    { key: 'inprogress', label: 'En cours' },
    { key: 'done', label: 'Terminé' }
  ];
  return `
    <div class="tab-panel" data-tab="tasks">
      <div class="kanban">
        ${cols.map(col => {
          const tasks = p.tasks.filter(t => t.status === col.key);
          return `
            <div class="kanban-col">
              <div class="kanban-col-title">${col.label}<span class="kanban-col-count">${tasks.length}</span></div>
              ${tasks.map(t => {
                const tc = TAG_COLORS[t.tag] || TAG_COLORS.other;
                return `<div class="task-item">
                  <div class="task-name">${t.name}</div>
                  <span class="task-tag" style="background:${tc.bg};color:${tc.text}">${t.tag}</span>

              <button class="add-task-btn" onclick="openAddTaskModal()">+ Ajouter une tâche</button>

          `;
        }).join('')}
      </div>

  `;
}

        </div>
      </div>
    </div>

}

  if (!p.marketing) return `<div class="tab-panel" data-tab="marketing"><div style="color:var(--text3);padding:20px;">Pas de stratégie marketing pour ce projet.</div></div>`;

      <div class="strategy-grid">

function renderNotesTab(p) {

    { day: 7, type: 'tt', label: 'Grandiose — recette' },
    { day: 8, type: 'ig', label: 'Grandiose — story' },
    { day: 10, type: 'li', label: 'Portfolio — projet' },
    { day: 12, type: 'ig', label: 'Grandiose — vidéo' },
    { day: 14, type: 'tt', label: 'Grandiose — teaser' },
    { day: 15, type: 'ig', label: 'Portfolio — photo' },
    { day: 17, type: 'li', label: 'Grandiose — article' },
    { day: 19, type: 'ig', label: 'Grandiose — produit' },
    { day: 21, type: 'tt', label: 'Portfolio — reel' },
    { day: 22, type: 'ig', label: 'Grandiose — coulisses' },
    { day: 24, type: 'li', label: 'Portfolio — B2B' },
    { day: 26, type: 'ig', label: 'Grandiose — story' },
    { day: 28, type: 'tt', label: 'Grandiose — viral' },
    { day: 29, type: 'ig', label: 'Portfolio — best-of' },
  ];
  // April 2026 starts on Wednesday
  let html = '';
  for (let i = 0; i < 1; i++) html += `<div class="cal-day" style="background:transparent;border:none;"></div>`;
  for (let i = 0; i < 1; i++) html += `<div class="cal-day" style="background:transparent;border:none;"></div>`;
  for (let d = 1; d <= 30; d++) {
    const dayPosts = posts.filter(p => p.day === d);
    html += `<div class="cal-day">
      <div class="cal-day-num">${d}</div>
      ${dayPosts.map(p => `<div class="cal-post post-${p.type}">${p.label}</div>`).join('')}
    </div>`;
  }
  body.innerHTML = html;
}

// ====== MODALS ======
function openNewProjectModal() {
  document.getElementById('modal-new-project').classList.add('open');
}
function openAddTaskModal() {
  document.getElementById('modal-add-task').classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedColor = el.dataset.color;
}

function createProject() {
  const name = document.getElementById('np-name').value.trim();
  const client = document.getElementById('np-client').value.trim();
  const desc = document.getElementById('np-desc').value.trim();
  const status = document.getElementById('np-status').value;
  if (!name) { showToast('Donne un nom au projet', false); return; }
  const id = 'proj_' + Date.now();
  state.projects.push({
    id, name, client: client || 'Non défini', desc: desc || 'Projet en cours de définition.', color: state.selectedColor,
    status, progress: 0, deadline: 'À définir', tasks: [], milestones: [], marketing: null, files: [], notes: ''
  });
  closeModal('modal-new-project');
  document.getElementById('np-name').value = '';
  document.getElementById('np-client').value = '';
  document.getElementById('np-desc').value = '';
  showToast('Projet créé !', true);
  renderDashboard();
  renderAllProjects();
}

function addTask() {
  const name = document.getElementById('task-name').value.trim();
  const tag = document.getElementById('task-status').value;
  const status = document.getElementById('task-status').value;
  if (!name) { showToast('Donne un nom à la tâche', false); return; }
  const p = state.projects.find(x => x.id === state.currentProject);
  if (!p) return;
  p.tasks.push({ id: 't_' + Date.now(), name, tag: document.getElementById('task-tag').value, status });
  closeModal('modal-add-task');
  document.getElementById('task-name').value = '';
  showToast('Tâche ajoutée !', true);
  renderProjectDetail(state.currentProject);
}

function saveNote(id, val) {
  const p = state.projects.find(x => x.id === id);
  if (p) p.notes = val;
}

function shareProject() {
  showToast('Lien copié — à configurer avec ton domaine', true);
}

function showToast(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (success ? ' success' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

loadDemoData();
renderDashboard();
renderCalendar();
</script>
