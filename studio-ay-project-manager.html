<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HAMOUNI — Work OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090b; --s1:#111113; --s2:#18181b; --s3:#1c1c1f;
  --br:rgba(255,255,255,.06); --br2:rgba(255,255,255,.10); --br3:rgba(255,255,255,.16);
  --tx:#fafafa; --tx2:#a1a1aa; --tx3:#52525b;
  --ac:#C9A86C; --ac2:#E8D5A3; --acd:rgba(201,168,108,.10);
  --gr:#22c55e; --bl:#3b82f6; --rd:#ef4444; --am:#f59e0b; --pu:#a855f7;
  --r:8px; --rl:12px;
  --font-d:'Syne',sans-serif;
  --font-b:'Inter',sans-serif;
  --sb:248px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font-b);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font-b);font-size:13px}
button{cursor:pointer}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sb);background:var(--s1);border-right:1px solid var(--br);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.main{margin-left:var(--sb);flex:1;min-height:100vh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;backdrop-filter:blur(2px)}
.overlay.on{display:block}

/* ── SIDEBAR ── */
.s-logo{padding:18px 16px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.s-logo-mark{display:flex;align-items:center;gap:9px}
.s-logo-ic{width:28px;height:28px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:13px;font-weight:800;color:#000;flex-shrink:0}
.s-logo-nm{font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:-.01em}
.s-logo-sb{font-size:10px;color:var(--tx3);letter-spacing:.04em}
.s-close{display:none;background:none;border:none;color:var(--tx3);padding:4px;border-radius:4px;line-height:1}
.s-nav{padding:10px 8px;flex:1;overflow-y:auto}
.s-sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .12s;margin-bottom:1px;user-select:none;position:relative}
.ni:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.ni.on{background:var(--acd);color:var(--ac)}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--ac);border-radius:0 2px 2px 0}
.ni svg{flex-shrink:0;opacity:.7}
.ni.on svg{opacity:1}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-foot{padding:12px;border-top:1px solid var(--br)}
.upill{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s2);border:1px solid var(--br);border-radius:var(--r)}
.uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#8B5E2A);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--font-d)}
.unm{font-size:12px;font-weight:500}
.uro{font-size:10px;color:var(--tx3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--gr);margin-left:auto;flex-shrink:0}

/* ── TOPBAR ── */
.topbar{height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br);background:rgba(9,9,11,.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;gap:12px}
.tb-l{display:flex;align-items:center;gap:10px}
.hbg{display:none;background:none;border:1px solid var(--br2);border-radius:6px;color:var(--tx2);padding:5px 7px;line-height:1;transition:all .15s}
.hbg:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.tb-t{font-family:var(--font-d);font-size:15px;font-weight:600;letter-spacing:-.01em}
.tb-r{display:flex;align-items:center;gap:8px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:none;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;line-height:1;cursor:pointer}
.bp{background:var(--ac);color:#000}
.bp:hover{background:var(--ac2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,108,.2)}
.bp:active{transform:translateY(0)}
.bg{background:transparent;color:var(--tx2);border:1px solid var(--br2)}
.bg:hover{background:rgba(255,255,255,.04);color:var(--tx);border-color:var(--br3)}
.bsm{padding:5px 11px;font-size:11px}
.bic{background:none;border:none;color:var(--tx3);padding:5px;border-radius:5px;line-height:1;transition:all .12s;cursor:pointer}
.bic:hover{background:rgba(255,255,255,.06);color:var(--tx2)}
.bic.rd:hover{background:rgba(239,68,68,.1);color:var(--rd)}

/* ── VIEWS ── */
.view{display:none;padding:28px 24px;animation:vIn .2s ease}
.view.on{display:block}
@keyframes vIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sc{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:18px 20px;transition:border-color .2s}
.sc:hover{border-color:var(--br2)}
.sc.hi{border-color:rgba(201,168,108,.2);background:rgba(201,168,108,.04)}
.sc .vl{font-size:26px;font-weight:300;font-family:var(--font-d);color:var(--tx);line-height:1;margin:8px 0 4px}
.sc.hi .vl{color:var(--ac)}
.sc .lb{font-size:10px;font-weight:500;color:var(--tx3);letter-spacing:.04em;text-transform:uppercase}
.sc .sb2{font-size:11px;color:var(--tx3)}

/* ── PROJECT GRID ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-t{font-size:11px;font-weight:600;font-family:var(--font-d);color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}

/* ── PROJECT CARD ── */
.pc{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.pc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cc) 30%,transparent 70%);opacity:.6}
.pc:hover{border-color:var(--br3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.pc-nm{font-size:14px;font-weight:600;font-family:var(--font-d);letter-spacing:-.01em}
.pc-cl{font-size:11px;color:var(--tx3);margin-top:3px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ba{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2)}
.bpl{background:rgba(168,85,247,.1);color:var(--pu);border:1px solid rgba(168,85,247,.2)}
.bpe{background:rgba(59,130,246,.1);color:var(--bl);border:1px solid rgba(59,130,246,.2)}
.bu{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.pc-ds{font-size:12px;color:var(--tx3);line-height:1.6;margin-bottom:14px}
.pb-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:5px}
.pbar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}
.pbf{height:100%;border-radius:1px;background:var(--cc);transition:width .6s cubic-bezier(.4,0,.2,1)}
.pc-mt{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.pc-mi{font-size:11px;color:var(--tx3)}
.pc-mi.ac{color:var(--ac)}

/* ── DETAIL ── */
.dh{background:var(--s1);border-bottom:1px solid var(--br);padding:22px 24px}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px}
.dh-mt{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.dh-t{font-family:var(--font-d);font-size:22px;font-weight:700;letter-spacing:-.02em}
.dh-c{font-size:13px;color:var(--tx3);margin-top:3px}
.dh-pct{font-family:var(--font-d);font-size:30px;font-weight:700;line-height:1}
.dh-plbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.dh-pb{width:150px;margin-top:7px;margin-left:auto}
.tbar{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbar::-webkit-scrollbar{height:0}
.tab{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;color:var(--tx3);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none;border:1px solid transparent}
.tab:hover{color:var(--tx2);background:rgba(255,255,255,.04)}
.tab.on{color:var(--tx);background:var(--s2);border-color:var(--br2)}
.dc{padding:22px 24px}
.tp{display:none;animation:vIn .15s ease}
.tp.on{display:block}

/* ── KANBAN ── */
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kc{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:14px}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.kc-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.kc-n{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--s2);color:var(--tx3);border:1px solid var(--br)}
.tc{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:11px 12px;margin-bottom:6px;transition:all .15s}
.tc:hover{border-color:var(--br2);background:var(--s3)}
.tc-top{display:flex;align-items:flex-start;gap:9px}
.tcb{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--br3);flex-shrink:0;cursor:pointer;transition:all .18s;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.tcb:hover{border-color:var(--ac)}
.tcb.dn{background:var(--gr);border-color:var(--gr);color:#fff}
.tcb.pr{background:var(--bl);border-color:var(--bl)}
.tc-nm{font-size:12.5px;color:var(--tx);line-height:1.45;flex:1}
.tc-nm.st{text-decoration:line-through;color:var(--tx3)}
.tc-nt{font-size:11px;color:var(--tx3);margin-top:4px;padding-left:25px;font-style:italic}
.tc-ft{display:flex;align-items:center;gap:5px;margin-top:7px;padding-left:25px;opacity:0;transition:opacity .15s;flex-wrap:wrap}
.tc:hover .tc-ft{opacity:1}
.ttag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.icb{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--br2);background:none;color:var(--tx3);transition:all .12s;cursor:pointer}
.icb:hover{background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--br3)}
.icb.rd:hover{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.25)}
.add-r{width:100%;padding:8px;border-radius:var(--r);border:1px dashed rgba(255,255,255,.08);background:transparent;color:var(--tx3);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:5px}
.add-r:hover{background:rgba(255,255,255,.03);color:var(--tx2);border-color:rgba(255,255,255,.14)}
.hint{background:rgba(255,255,255,.025);border:1px solid var(--br);border-radius:var(--r);padding:9px 14px;font-size:11px;color:var(--tx3);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── ÉTAPES ── */
.el{position:relative}
.ei{display:flex;gap:16px;margin-bottom:4px}
.et{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0;padding-top:3px}
.ed{width:14px;height:14px;border-radius:50%;border:2px solid var(--br3);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:transparent;flex-shrink:0;position:relative;z-index:1}
.ed:hover{border-color:var(--ac)}
.ed.dn{background:var(--gr);border-color:var(--gr);color:#fff}
.ed.cr{background:var(--ac);border-color:var(--ac);box-shadow:0 0 0 3px rgba(201,168,108,.15)}
.el-ln{width:1px;flex:1;min-height:20px;background:var(--br);margin:4px 0}
.ec{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;flex:1;transition:all .18s}
.ec:hover{border-color:var(--br2)}
.ec.cr-c{border-color:rgba(201,168,108,.25);background:rgba(201,168,108,.03)}
.e-dt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:5px}
.e-nm{font-size:14px;font-weight:600;font-family:var(--font-d);color:var(--tx);margin-bottom:4px}
.e-ds{font-size:12px;color:var(--tx3);line-height:1.5;margin-bottom:10px}
.e-st{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.es-dn{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2)}
.es-cr{background:rgba(201,168,108,.1);color:var(--ac);border:1px solid rgba(201,168,108,.25)}
.es-td{background:rgba(255,255,255,.04);color:var(--tx3);border:1px solid var(--br)}
.e-ac{display:flex;gap:5px;margin-top:8px;opacity:0;transition:opacity .15s}
.ec:hover .e-ac{opacity:1}

/* ── RAPPORT ── */
.rw{max-width:680px}
.rh{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:20px 22px;margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px}
.r-t{font-family:var(--font-d);font-size:19px;font-weight:700}
.r-s{font-size:12px;color:var(--tx3);margin-top:2px}
.r-pct{font-family:var(--font-d);font-size:34px;font-weight:700;line-height:1}
.rs{margin-bottom:18px}
.rs-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.rs-h::after{content:'';flex:1;height:1px;background:var(--br)}
.rr{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--s1);border:1px solid var(--br);border-radius:var(--r);margin-bottom:5px;font-size:13px}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── PLANNING ── */
.p-charge{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:16px 20px;margin-bottom:18px}
.p-charge-top{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:10px}
.p-charge-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.p-charge-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pc-ok{background:var(--gr)}
.pc-mid{background:var(--am)}
.pc-ov{background:var(--rd)}

.p-sum{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.ps-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-left:3px solid var(--pc)}
.ps-nm{font-size:12px;font-weight:600}
.ps-h{font-size:10px;color:var(--tx3);margin-top:2px}
.ps-v{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--pc)}

.p-grid{border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;background:var(--s1);margin-bottom:20px}
.p-grid-inner{display:grid;grid-template-columns:130px repeat(7,1fr)}
.p-hcell{background:var(--s2);border-bottom:1px solid var(--br);border-right:1px solid var(--br);padding:10px 8px;font-size:10px;font-weight:600;text-align:center;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3)}
.p-hcell.td{color:var(--ac);background:rgba(201,168,108,.05)}
.p-hcell:last-child{border-right:none}
.p-rlbl{display:flex;align-items:center;gap:8px;padding:12px 10px;border-bottom:1px solid var(--br);border-right:1px solid var(--br);font-size:11px;font-weight:500;color:var(--tx2);background:var(--s2)}
.p-cell{border-bottom:1px solid var(--br);border-right:1px solid var(--br);min-height:64px;padding:5px;position:relative;cursor:pointer;transition:background .15s}
.p-cell:hover{background:rgba(255,255,255,.02)}
.p-cell.td{background:rgba(201,168,108,.025)}
.p-cell:last-child{border-right:none}
.p-blk{border-radius:4px;padding:4px 7px;font-size:10px;font-weight:600;color:#fff;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:4px;cursor:pointer}
.p-blk:hover{opacity:.82}
.p-blk-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.p-blk-h{font-size:9px;opacity:.7;white-space:nowrap}
.p-plus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,255,255,.08);opacity:0;transition:opacity .15s}
.p-cell:hover .p-plus{opacity:1}

/* ── NOTES ── */
.nw{background:var(--s1);border:1px solid var(--br);border-radius:var(--rl);padding:18px}
.nta{width:100%;background:transparent;border:none;color:var(--tx);font-size:13px;line-height:1.8;resize:none;outline:none;min-height:200px}
.nta::placeholder{color:var(--tx3)}
.nlk{font-size:11px;color:var(--tx3);margin-top:10px;display:flex;align-items:center;gap:5px}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.mo.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--br2);border-radius:16px;padding:24px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto;animation:mIn .2s cubic-bezier(.34,1.2,.64,1)}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.m-t{font-family:var(--font-d);font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-.01em}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:6px}
.fi,.fs,.ft{width:100%;background:var(--s2);border:1px solid var(--br2);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:13px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus,.ft:focus{border-color:var(--ac)}
.ft{resize:vertical;min-height:70px}
.fa{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.cr{display:flex;gap:8px;flex-wrap:wrap}
.co{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.co.on{border-color:#fff;transform:scale(1.15)}

/* ── TOAST ── */

// ─────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────
function gv(n) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('on'); });
  document.querySelectorAll('.ni').forEach(function(x){ x.classList.remove('on'); });
  var el = document.getElementById('v-'+n);
  if (el) el.classList.add('on');
  var ni = document.getElementById('ni-'+n.replace('projects','proj').replace('planning','plan').replace('dashboard','dash').replace('detail',''));
  if (ni) ni.classList.add('on');
  if (n === 'dashboard') renderDash();
  else if (n === 'projects') renderAll();
  else if (n === 'planning') renderPlan();
}
function op(id) { D.cur=id; D.tab='overview'; gv('detail'); renderDetail(id); }
function goBack() { gv('projects'); }
function openSB() { document.getElementById('sb').classList.add('op'); document.getElementById('overlay').classList.add('on'); }
function closeSB() { document.getElementById('sb').classList.remove('op'); document.getElementById('overlay').classList.remove('on'); }

// ─────────────────────────────────────────
//  DASHBOARD
// ─────────────────────────────────────────
function renderDash() {
  var allT = D.projects.reduce(function(a,p){ return a.concat(p.tasks); }, []);
  var dn = allT.filter(function(t){ return t.status==='done'; }).length;
  var urg = D.projects.filter(function(p){ return p.status==='urgent'; }).length;
  var pct = allT.length ? Math.round(dn/allT.length*100) : 0;

  document.getElementById('stats').innerHTML =
    sc('hi','Projets',D.projects.length,'actifs') +
    sc('','En cours',D.projects.filter(function(p){ return p.status==='active'; }).length,'projets') +
    sc('','<span style="color:var(--rd)">Urgent</span>','<span style="color:var(--rd)">'+urg+'</span>','à traiter') +
    sc('','Tâches',dn+'/'+allT.length,pct+'% complétées');

  document.getElementById('dp').innerHTML = D.projects.map(pcH).join('');
  renderSP();
}

function sc(cls, lb, vl, sb) {
  return '<div class="sc '+cls+'"><div class="lb">'+lb+'</div><div class="vl">'+vl+'</div><div class="sb2">'+sb+'</div></div>';
}

function renderAll() {
  document.getElementById('ap').innerHTML = D.projects.map(pcH).join('');
}

    return '<div class="ni" onclick="op(\''+p.id+'\');closeSB()"><div class="pdot" style="background:'+p.color+'"></div>'+p.name+'</div>';
  }).join('');
}

function pcH(p) {
  var dn = p.tasks.filter(function(t){ return t.status==='done'; }).length;
  var pct = p.tasks.length ? Math.round(dn/p.tasks.length*100) : 0;
  var s = STATUS[p.status];
  return '<div class="pc" style="--cc:'+p.color+'" onclick="op(\''+p.id+'\')">'
    +'<div class="pc-top"><div><div class="pc-nm">'+p.name+'</div><div class="pc-cl">'+p.client+'</div></div><span class="badge '+s.c+'">'+s.l+'</span></div>'
    +'<div class="pc-ds">'+(p.desc.length>90?p.desc.slice(0,90)+'…':p.desc)+'</div>'
    +'<div class="pb-lbl"><span>Avancement</span><span>'+pct+'%</span></div><div class="pbar"><div class="pbf" style="width:'+pct+'%"></div></div>'
    +'<div class="pc-mt"><span class="pc-mi">'+dn+'/'+p.tasks.length+' tâches</span>'+(p.instagram?'<span class="pc-mi ac">'+p.instagram+'</span>':'')+'<span class="pc-mi" style="margin-left:auto">'+p.deadline+'</span></div>'
    +'</div>';
}

//  DETAIL
// ─────────────────────────────────────────
function renderDetail(id) {
  var p = D.projects.find(function(x){ return x.id===id; });
  if (!p) return;
  var dn = p.tasks.filter(function(t){ return t.status==='done'; }).length;
  var pct = p.tasks.length ? Math.round(dn/p.tasks.length*100) : 0;
  var s = STATUS[p.status];
  var tabs = ['overview','tasks','etapes','rapport','notes'];
  var tlbs = ['Vue générale','Tâches','Étapes','Rapport','Notes'];

  document.getElementById('dta').innerHTML =
    '<button class="btn bg bsm no-print" onclick="openEP(\''+p.id+'\')">Modifier</button>';

  var hero = '<div class="dh" style="border-top:2px solid '+p.color+'">'
    +'<div class="dh-top"><div><div class="dh-mt"><span class="badge '+s.c+'">'+s.l+'</span><span style="font-size:11px;color:var(--tx3)">'+p.deadline+'</span>'+(p.instagram?'<span style="font-size:11px;color:var(--ac)">'+p.instagram+'</span>':'')+'</div><div class="dh-t">'+p.name+'</div><div class="dh-c">'+p.client+'</div></div>'
    +'<div style="text-align:right"><div class="dh-pct" style="color:'+p.color+'">'+pct+'%</div><div class="dh-plbl">Complété</div><div class="dh-pb pbar" style="--cc:'+p.color+'"><div class="pbf" style="width:'+pct+'%"></div></div></div></div>'
    +'<div class="tbar">'+tabs.map(function(t,i){ return '<div class="tab'+(t===D.tab?' on':'')+'" onclick="swT(\''+id+'\',\''+t+'\',this)">'+tlbs[i]+'</div>'; }).join('')+'</div>'
    +'</div>';

  var panels = '<div class="dc">';
  panels += '<div class="tp'+(D.tab==='overview'?' on':'')+'" data-t="overview">'+rOverview(p)+'</div>';
  panels += '<div class="tp'+(D.tab==='tasks'?' on':'')+'" data-t="tasks">'+rTasks(p)+'</div>';
  panels += '<div class="tp'+(D.tab==='etapes'?' on':'')+'" data-t="etapes">'+rEtapes(p)+'</div>';
  panels += '<div class="tp'+(D.tab==='rapport'?' on':'')+'" data-t="rapport">'+rRapport(p)+'</div>';
  panels += '<div class="tp'+(D.tab==='notes'?' on':'')+'" data-t="notes">'+rNotes(p)+'</div>';
  panels += '</div>';

  document.getElementById('pdc').innerHTML = hero + panels;
}

function rOverview(p) {
  var dn=p.tasks.filter(function(t){return t.status==='done';}).length;
  var pr=p.tasks.filter(function(t){return t.status==='inprogress';}).length;
  var td=p.tasks.filter(function(t){return t.status==='todo';}).length;
  return '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">'
    +sc('','<span style="color:var(--gr)">Terminé</span>','<span style="color:var(--gr)">'+dn+'</span>','')
    +sc('','<span style="color:var(--bl)">En cours</span>','<span style="color:var(--bl)">'+pr+'</span>','')
    +sc('','À faire',td,'')
    +'</div>'
    +'<div class="nw"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:10px">Description</div><div style="font-size:13px;color:var(--tx2);line-height:1.8">'+p.desc+'</div></div>';
}

function rTasks(p) {
  var cols=['todo','inprogress','done'];
  var lbls=['À faire','En cours','Terminé'];
  var clrs=['var(--tx3)','var(--bl)','var(--gr)'];
  var h='<div class="hint">💡 Clique sur le cercle pour changer le statut · Survole pour modifier ou supprimer</div>';
  h+='<div class="kb">';
  cols.forEach(function(s,i){
    var tasks=p.tasks.filter(function(t){return t.status===s;});
    h+='<div class="kc"><div class="kc-hd"><span class="kc-t" style="color:'+clrs[i]+'">'+lbls[i]+'</span><span class="kc-n">'+tasks.length+'</span></div>';
    tasks.forEach(function(t){h+=tcH(t,p.id);});
    h+='<button class="add-r" onclick="openAddT()"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter</button></div>';
  });
  return h+'</div>';
}

function tcH(t,pid){
  var c=TAGS[t.tag]||TAGS.other;
  var nl=t.status==='todo'?'→ En cours':t.status==='inprogress'?'✓ Terminé':'↩ Réouvrir';
  var bc=t.status==='done'?'dn':t.status==='inprogress'?'pr':'';
  var bi=t.status==='done'?'✓':t.status==='inprogress'?'●':'';
  return '<div class="tc"><div class="tc-top"><div class="tcb '+bc+'" onclick="cycT(\''+pid+'\',\''+t.id+'\')" title="'+nl+'">'+bi+'</div><div class="tc-nm'+(t.status==='done'?' st':'')+'">'+t.name+'</div></div>'
    +(t.note?'<div class="tc-nt">↳ '+t.note+'</div>':'')
    +'<div class="tc-ft"><span class="ttag" style="background:'+c.bg+';color:'+c.t+'">'+t.tag+'</span>'
    +'<button class="icb" onclick="openEditT(\''+pid+'\',\''+t.id+'\')">Modifier</button>'
    +'<button class="icb rd" onclick="delT(\''+pid+'\',\''+t.id+'\')">Supprimer</button>'
    +'<span style="font-size:10px;color:var(--tx3);margin-left:auto">'+nl+'</span>'
    +'</div></div>';
}

function rEtapes(p) {
  var h='<div class="hint">💡 Clique sur le cercle pour changer l\'état · Survole pour modifier ou supprimer</div>';
  if(!p.etapes||!p.etapes.length) h+='<div style="color:var(--tx3);padding:14px;font-size:13px">Aucune étape. Ajoute-en une !</div>';
  else{
    h+='<div class="el">';
    p.etapes.forEach(function(e,i){
      var isLast=i===p.etapes.length-1;
      var dc=e.status==='done'?'var(--gr)':e.status==='current'?p.color:'transparent';
      var bc=e.status==='done'?'dn':e.status==='current'?'cr':'';
      var bi=e.status==='done'?'✓':e.status==='current'?'●':'';
      var nl=e.status==='todo'?'→ En cours':e.status==='current'?'✓ Terminé':'↩ À venir';
      var sc2=e.status==='done'?'es-dn':e.status==='current'?'es-cr':'es-td';
      var sl=e.status==='done'?'✓ Terminé':e.status==='current'?'● En cours':'○ À venir';
      h+='<div class="ei"><div class="et"><div class="ed '+bc+'" onclick="cycE(\''+p.id+'\',\''+e.id+'\')" title="'+nl+'" style="color:'+(e.status==='done'?'#fff':'transparent')+'">'+bi+'</div>'+(isLast?'':'<div class="el-ln"></div>')+'</div>';
      h+='<div class="ec'+(e.status==='current'?' cr-c':'')+'"><div class="e-dt">'+e.date+'</div><div class="e-nm">'+e.name+'</div>'+(e.desc?'<div class="e-ds">'+e.desc+'</div>':'')+'<span class="e-st '+sc2+'">'+sl+'</span>';
      h+='<div class="e-ac"><button class="icb" onclick="openEditE(\''+p.id+'\',\''+e.id+'\')">Modifier</button><button class="icb rd" onclick="delE(\''+p.id+'\',\''+e.id+'\')">Supprimer</button><span style="font-size:10px;color:var(--tx3);margin-left:auto">'+nl+'</span></div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='<button class="add-r" style="margin-top:8px" onclick="openAddE()"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter une étape</button>';
  return h;
}

function rRapport(p) {
  var now=new Date();
  var mos=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var mn=mos[now.getMonth()]+' '+now.getFullYear();
  var dn=p.tasks.filter(function(t){return t.status==='done';});
  var pr=p.tasks.filter(function(t){return t.status==='inprogress';});
  var td=p.tasks.filter(function(t){return t.status==='todo';});
  var pct=p.tasks.length?Math.round(dn.length/p.tasks.length*100):0;
  var ec=(p.etapes||[]).filter(function(e){return e.status==='current';});
  var h='<div class="rw">';
  h+='<div class="rh"><div><div class="r-t">'+p.name+'</div><div class="r-s">'+p.client+' · Rapport '+mn+'</div></div><div style="text-align:right"><div class="r-pct" style="color:'+p.color+'">'+pct+'%</div><div style="font-size:11px;color:var(--tx3);margin-top:3px">Avancement global</div></div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">'
    +sc('','<span style="color:var(--gr)">Terminées</span>','<span style="color:var(--gr)">'+dn.length+'</span>','')
    +sc('','<span style="color:var(--bl)">En cours</span>','<span style="color:var(--bl)">'+pr.length+'</span>','')
    +sc('','À faire',td.length,'')+'</div>';
  if(dn.length){h+='<div class="rs"><div class="rs-h">Ce qu\'on a réalisé</div>';dn.forEach(function(t){var c=TAGS[t.tag]||TAGS.other;h+='<div class="rr"><div class="rdot" style="background:var(--gr)"></div><span style="flex:1">'+t.name+'</span><span class="ttag" style="background:'+c.bg+';color:'+c.t+'">'+t.tag+'</span></div>';});h+='</div>';}
  if(pr.length){h+='<div class="rs"><div class="rs-h">En cours de réalisation</div>';pr.forEach(function(t){var c=TAGS[t.tag]||TAGS.other;h+='<div class="rr"><div class="rdot" style="background:var(--bl)"></div><span style="flex:1">'+t.name+(t.note?' <span style="font-size:11px;color:var(--tx3);font-style:italic">— '+t.note+'</span>':'')+'</span><span class="ttag" style="background:'+c.bg+';color:'+c.t+'">'+t.tag+'</span></div>';});h+='</div>';}
  if(ec.length){h+='<div class="rs"><div class="rs-h">Étape actuelle</div>';ec.forEach(function(e){h+='<div class="rr"><div class="rdot" style="background:'+p.color+'"></div><div style="flex:1"><div>'+e.name+'</div>'+(e.desc?'<div style="font-size:11px;color:var(--tx3)">'+e.desc+'</div>':'')+'</div><span style="font-size:11px;color:var(--tx3)">'+e.date+'</span></div>';});h+='</div>';}
  if(td.length){h+='<div class="rs"><div class="rs-h">Prochaines actions</div>';td.slice(0,5).forEach(function(t){h+='<div class="rr"><div class="rdot" style="background:var(--tx3)"></div><span>'+t.name+'</span></div>';});if(td.length>5)h+='<div style="font-size:11px;color:var(--tx3);padding:8px 14px">+ '+(td.length-5)+' autres…</div>';h+='</div>';}
  h+='<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div style="font-size:11px;color:var(--tx3)">HAMOUNI Studio · Ayoub · @hamouni.ay</div><button class="btn bg bsm no-print" onclick="window.print()">🖨 Imprimer / PDF</button></div>';
  h+='</div>';
  return h;
}

function rNotes(p) {
  return '<div class="nw"><textarea class="nta" placeholder="Notes internes, idées, remarques… (privées)" onchange="saveNote(\''+p.id+'\',this.value)">'+(p.notes||'')+'</textarea></div><div class="nlk">🔒 Notes privées — pour toi uniquement</div>';
}

function swT(pid,tab,el) {
  D.tab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');
  document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('on');});
  var tp=document.querySelector('.tp[data-t="'+tab+'"]');
  if(tp) tp.classList.add('on');
}

// ─────────────────────────────────────────
function cycT(pid,tid){
  var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
  var t=p.tasks.find(function(x){return x.id===tid;});if(!t)return;
  var c={todo:'inprogress',inprogress:'done',done:'todo'};t.status=c[t.status];
  save();renderDetail(pid);renderDash();
  toast(t.status==='done'?'Tâche terminée ✓':t.status==='inprogress'?'En cours':'Remis à faire',true);
}
function openAddT(){D.editT=null;document.getElementById('mt-title').textContent='Nouvelle tâche';document.getElementById('t-sv').textContent='Ajouter';document.getElementById('t-nm').value='';document.getElementById('t-nt').value='';document.getElementById('t-st').value='todo';om('m-task');}
function openEditT(pid,tid){D.editT=tid;var p=D.projects.find(function(x){return x.id===pid;});var t=p&&p.tasks.find(function(x){return x.id===tid;});if(!t)return;document.getElementById('mt-title').textContent='Modifier la tâche';document.getElementById('t-sv').textContent='Enregistrer';document.getElementById('t-nm').value=t.name;document.getElementById('t-tg').value=t.tag;document.getElementById('t-st').value=t.status;document.getElementById('t-nt').value=t.note||'';om('m-task');}
function saveT(){
  var nm=document.getElementById('t-nm').value.trim();if(!nm){toast('Nom requis',false);return;}
  var p=D.projects.find(function(x){return x.id===D.cur;});if(!p)return;
  var nt=document.getElementById('t-nt').value.trim();
  if(D.editT){var t=p.tasks.find(function(x){return x.id===D.editT;});if(t){t.name=nm;t.tag=document.getElementById('t-tg').value;t.status=document.getElementById('t-st').value;t.note=nt||null;}toast('Tâche modifiée',true);}
  else{p.tasks.push({id:'t_'+Date.now(),name:nm,tag:document.getElementById('t-tg').value,status:document.getElementById('t-st').value,note:nt||null});toast('Tâche ajoutée',true);}
  save();cm('m-task');renderDetail(D.cur);renderDash();
}
function delT(pid,tid){if(!confirm('Supprimer cette tâche ?'))return;var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;p.tasks=p.tasks.filter(function(x){return x.id!==tid;});save();renderDetail(pid);renderDash();toast('Supprimée',true);}

function cycE(pid,eid){
  var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
  var e=p.etapes.find(function(x){return x.id===eid;});if(!e)return;

  save();renderDetail(pid);toast('Étape → '+(e.status==='done'?'Terminée ✓':e.status==='current'?'En cours':'À venir'),true);
}
function openAddE(){D.editE=null;document.getElementById('me-title').textContent='Nouvelle étape';document.getElementById('e-sv').textContent='Ajouter';['e-nm','e-dt','e-ds'].forEach(function(x){document.getElementById(x).value='';});document.getElementById('e-st').value='todo';om('m-etape');}
function openEditE(pid,eid){D.editE=eid;var p=D.projects.find(function(x){return x.id===pid;});var e=p&&p.etapes.find(function(x){return x.id===eid;});if(!e)return;document.getElementById('me-title').textContent='Modifier l\'étape';document.getElementById('e-sv').textContent='Enregistrer';document.getElementById('e-nm').value=e.name;document.getElementById('e-dt').value=e.date;document.getElementById('e-ds').value=e.desc||'';document.getElementById('e-st').value=e.status;om('m-etape');}
function saveE(){
  var nm=document.getElementById('e-nm').value.trim(),dt=document.getElementById('e-dt').value.trim();
  if(!nm||!dt){toast('Titre et date requis',false);return;}
  var p=D.projects.find(function(x){return x.id===D.cur;});if(!p)return;
  if(!p.etapes)p.etapes=[];
  var ds=document.getElementById('e-ds').value.trim(),st=document.getElementById('e-st').value;
  if(D.editE){var e=p.etapes.find(function(x){return x.id===D.editE;});if(e){e.name=nm;e.date=dt;e.desc=ds||null;e.status=st;}toast('Étape modifiée',true);}
  else{p.etapes.push({id:'e_'+Date.now(),name:nm,date:dt,desc:ds||null,status:st});toast('Étape ajoutée',true);}
  save();cm('m-etape');renderDetail(D.cur);
}
function delE(pid,eid){if(!confirm('Supprimer cette étape ?'))return;var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;p.etapes=p.etapes.filter(function(x){return x.id!==eid;});save();renderDetail(pid);toast('Étape supprimée',true);}

// ─────────────────────────────────────────
//  PLANNING
// ─────────────────────────────────────────
function getDays(off){
  var now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(off*7));mon.setHours(0,0,0,0);
  var days=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  return days;
}
function isToday(d){var n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function dKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pw(n){D.planOff+=n;renderPlan();}
function pt(){D.planOff=0;renderPlan();}

function renderPlan(){
  var days=getDays(D.planOff);
  var dnames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var planData={};try{planData=JSON.parse(localStorage.getItem('hamouni_plan')||'{}');}catch(e){}
  var lbl=document.getElementById('wlbl');
  if(lbl)lbl.textContent=D.planOff===0?'Cette semaine':days[0].getDate()+'/'+(days[0].getMonth()+1)+' — '+days[6].getDate()+'/'+(days[6].getMonth()+1);

  // Compute hours per project
  var ph={};D.projects.forEach(function(p){ph[p.id]=0;});
  days.forEach(function(d){var k=dKey(d);if(planData[k])planData[k].forEach(function(b){ph[b.pid]=(ph[b.pid]||0)+b.hours;});});
  var tot=Object.keys(ph).reduce(function(a,k){return a+(ph[k]||0);},0);
  var max=40;
  var cc=tot<=25?'pc-ok':tot<=40?'pc-mid':'pc-ov';
  var cl=tot<=25?'Charge normale 👍':tot<=40?'Semaine chargée ⚠️':'Surchargé ! 🔴';

  var h='';

  // Charge bar
  h+='<div class="p-charge"><div class="p-charge-top"><span>Charge — <strong>'+cl+'</strong></span><span style="font-weight:600">'+tot+'h / '+max+'h</span></div>';
  h+='<div class="p-charge-bar"><div class="p-charge-fill '+cc+'" style="width:'+Math.min(100,Math.round(tot/max*100))+'%"></div></div></div>';

  // Summary cards
  h+='<div class="p-sum">';
  D.projects.forEach(function(p){
    h+='<div class="ps-card" style="--pc:'+p.color+'"><div><div class="ps-nm">'+p.name+'</div><div class="ps-h">'+(ph[p.id]||0)+'h planifiées</div></div><div class="ps-v">'+(ph[p.id]||0)+'h</div></div>';
  });
  h+='</div>';

  // Grid
  h+='<div class="p-grid"><div class="p-grid-inner">';
  h+='<div class="p-hcell">Projet</div>';
  days.forEach(function(d,i){h+='<div class="p-hcell'+(isToday(d)?' td':'')+'">'+dnames[i]+'<br><strong>'+d.getDate()+'</strong></div>';});
  D.projects.forEach(function(p){
    h+='<div class="p-rlbl"><div class="pdot" style="background:'+p.color+'"></div>'+p.name+'</div>';
    days.forEach(function(d){
      var k=dKey(d);
      var blks=(planData[k]||[]).filter(function(b){return b.pid===p.id;});
      h+='<div class="p-cell'+(isToday(d)?' td':'')+'" onclick="addBlk(\''+p.id+'\',\''+k+'\')">';
      blks.forEach(function(b){h+='<div class="p-blk" style="background:'+p.color+'" onclick="event.stopPropagation();editBlk(\''+k+'\',\''+b.id+'\')" title="'+b.label+' — '+b.hours+'h"><span class="p-blk-nm">'+b.label+'</span><span class="p-blk-h">'+b.hours+'h</span></div>';});
      if(!blks.length)h+='<div class="p-plus">+</div>';
      h+='</div>';
    });
  });
  h+='</div></div>';

  // Tips
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:8px">';
  h+='<div class="sc"><div class="lb">💡 Comment utiliser</div><div style="font-size:12px;color:var(--tx3);line-height:1.7;margin-top:6px">Clique sur une cellule pour bloquer du temps. Donne-toi <strong style="color:var(--tx2)">un projet prioritaire</strong> par demi-journée.</div></div>';
  h+='<div class="sc"><div class="lb">🎯 Règle des 3</div><div style="font-size:12px;color:var(--tx3);line-height:1.7;margin-top:6px">Chaque matin, choisis <strong style="color:var(--tx2)">3 tâches max</strong> à finir. Concentre-toi sur une chose à la fois.</div></div>';
  h+='<div class="sc"><div class="lb">⚡ Focus</div><div style="font-size:12px;color:var(--tx3);line-height:1.7;margin-top:6px">Mariage → urgent. Grandiose → en cours. Guestation → dès que mariage livré.</div></div>';
  h+='</div>';

  document.getElementById('plan-content').innerHTML=h;
}

function addBlk(pid,dk){
  var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
  var lbl=prompt('Que fais-tu sur "'+p.name+'" ce jour-là ?','');
  if(lbl===null)return;
  var hs=prompt('Combien d\'heures ?','2');if(hs===null)return;
  var h=parseFloat(hs);if(isNaN(h)||h<=0){toast('Nombre d\'heures invalide',false);return;}
  var pd={};try{pd=JSON.parse(localStorage.getItem('hamouni_plan')||'{}');}catch(e){}
  if(!pd[dk])pd[dk]=[];
  pd[dk].push({id:'b_'+Date.now(),pid:pid,label:lbl||p.name,hours:h});
  localStorage.setItem('hamouni_plan',JSON.stringify(pd));
  renderPlan();toast(h+'h planifiées sur '+p.name,true);
}

function editBlk(dk,bid){
  var pd={};try{pd=JSON.parse(localStorage.getItem('hamouni_plan')||'{}');}catch(e){}
  if(!pd[dk])return;
  var b=pd[dk].find(function(x){return x.id===bid;});if(!b)return;
  var a=prompt('"'+b.label+'" — '+b.hours+'h\n\nNouvelle durée (ex: 3) ou tapez "supprimer"',b.hours);
  if(a===null)return;
  if(a.toLowerCase().trim()==='supprimer'){
    pd[dk]=pd[dk].filter(function(x){return x.id!==bid;});
    if(!pd[dk].length)delete pd[dk];
    localStorage.setItem('hamouni_plan',JSON.stringify(pd));
    renderPlan();toast('Bloc supprimé',true);
  }else{
    var h=parseFloat(a);
    if(!isNaN(h)&&h>0){b.hours=h;localStorage.setItem('hamouni_plan',JSON.stringify(pd));renderPlan();toast('Mis à jour',true);}
  }
}

// ─────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────
function om(id){document.getElementById(id).classList.add('on');}
function cm(id){document.getElementById(id).classList.remove('on');}
function pickC(el){document.querySelectorAll('.co').forEach(function(c){c.classList.remove('on');});el.classList.add('on');D.color=el.dataset.c;}
function toast(msg,ok){
  var t=document.getElementById('toast');
  document.getElementById('tmsg').textContent=msg;
  t.className='toast on '+(ok?'tok':'terr');
  clearTimeout(t._to);
  t._to=setTimeout(function(){t.classList.remove('on');},2600);
}
document.querySelectorAll('.mo').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('on');});});

// ─────────────────────────────────────────
//  INIT — simple et fiable
// ─────────────────────────────────────────
if (!load()) defaults();
renderDash();
</script>
