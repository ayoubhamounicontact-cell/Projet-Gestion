/* ============================================================
   [CSS] — Coller dans <style>, section CLIENT VIEW
   ============================================================ */
/*
:root déjà défini, on ajoute uniquement les vars manquantes:
*/
/* DM Mono font — ajoute dans <head> :
   <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

/* ---- NOISE GRAIN ---- */
body::before {
  content:'';
  position: fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .018;
  pointer-events:none;
  z-index:9998;
}

/* ---- CV WRAPPER ---- */
#cv { display:none; }
.cv-page { min-height:100vh; background:#060608; font-family:var(--font-body); color:#f0f0f4; -webkit-font-smoothing:antialiased; }

/* ---- NAV ---- */
.cv-topnav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 32px;
  background:rgba(6,6,8,.88);
  border-bottom:1px solid rgba(255,255,255,.055);
  backdrop-filter:blur(24px);
}
.cv-nav-brand { display:flex; align-items:center; gap:10px; }
.cv-nav-icon {
  width:26px; height:26px; background:var(--c-accent); border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:#000;
}
.cv-nav-name { font-size:12px; font-weight:600; color:rgba(255,255,255,.4); letter-spacing:.06em; text-transform:uppercase; }
.cv-nav-r { display:flex; align-items:center; gap:16px; }
.cv-live-badge {
  display:flex; align-items:center; gap:7px; padding:5px 12px;
  background:rgba(52,211,153,.06); border:1px solid rgba(52,211,153,.18); border-radius:20px;
  font-size:10px; font-weight:500; color:#34d399; letter-spacing:.08em; text-transform:uppercase;
  font-family:monospace;
}
.cv-live-dot {
  width:5px; height:5px; border-radius:50%; background:#34d399; position:relative; flex-shrink:0;
}
.cv-live-dot::after {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:1px solid #34d399; animation:cv-pulse 2.2s ease-out infinite;
}
@keyframes cv-pulse { 0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(2.6)} }
.cv-nav-clock { font-size:11px; color:rgba(255,255,255,.25); font-family:monospace; letter-spacing:.04em; }

/* ---- PAGE ---- */
.cv-outer { padding-top:52px; }

/* ---- HERO ---- */
.cv2-hero {
  position:relative; overflow:hidden; padding:72px 32px 56px;
  border-bottom:1px solid rgba(255,255,255,.055);
}
.cv2-hero-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 90% 80% at 50% 0%, black 20%, transparent 70%);
  opacity:.5;
}
.cv2-hero-glow {
  position:absolute; pointer-events:none;
  width:600px; height:300px;
  left:50%; top:0; transform:translateX(-50%);
  border-radius:50%; opacity:.3;
}
.cv2-hero-inner {
  position:relative; max-width:1100px; margin:0 auto;
  display:grid; grid-template-columns:1fr auto; gap:40px; align-items:flex-end;
}
.cv2-eyebrow {
  font-size:10px; font-weight:400; color:rgba(255,255,255,.25);
  letter-spacing:.14em; text-transform:uppercase; margin-bottom:18px;
  display:flex; align-items:center; gap:10px; font-family:monospace;
}
.cv2-eyebrow::before { content:''; width:20px; height:1px; background:rgba(255,255,255,.2); }
.cv2-title { font-family:var(--font-display); font-size:clamp(32px,4.5vw,52px); font-weight:700; letter-spacing:-.04em; line-height:1.0; color:#f0f0f4; margin-bottom:10px; }
.cv2-client { font-size:14px; color:rgba(255,255,255,.4); font-weight:300; margin-bottom:6px; }
.cv2-ig { font-size:11px; color:rgba(255,255,255,.22); font-family:monospace; }
.cv2-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:22px; }
.cv2-tag {
  font-size:9px; font-weight:400; text-transform:uppercase; letter-spacing:.1em;
  padding:4px 10px; border:1px solid rgba(255,255,255,.1); border-radius:3px;
  color:rgba(255,255,255,.3); font-family:monospace;
}
.cv2-tag.gold { border-color:rgba(201,168,108,.3); color:var(--c-accent); background:rgba(201,168,108,.08); }

/* ring */
.cv2-ring { position:relative; width:130px; height:130px; flex-shrink:0; }
.cv2-ring-svg { transform:rotate(-90deg); }
.cv2-ring-track { fill:none; stroke:rgba(255,255,255,.04); stroke-width:4; }
.cv2-ring-fill { fill:none; stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset 2s cubic-bezier(.4,0,.2,1); }
.cv2-ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.cv2-ring-pct { font-family:var(--font-display); font-size:28px; font-weight:700; line-height:1; color:#f0f0f4; }
.cv2-ring-lbl { font-size:8px; text-transform:uppercase; letter-spacing:.12em; color:rgba(255,255,255,.25); margin-top:4px; font-family:monospace; }

/* ---- KPI STRIP ---- */
.cv2-kpi-strip { display:grid; grid-template-columns:repeat(3,1fr); border-bottom:1px solid rgba(255,255,255,.055); }
.cv2-kpi { padding:22px 32px; border-right:1px solid rgba(255,255,255,.055); position:relative; overflow:hidden; }
.cv2-kpi:last-child { border-right:none; }
.cv2-kpi-lbl { font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:rgba(255,255,255,.3); margin-bottom:10px; display:flex; align-items:center; gap:8px; font-family:monospace; }
.cv2-kpi-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
.cv2-kpi-val { font-family:var(--font-display); font-size:36px; font-weight:300; line-height:1; margin-bottom:4px; }
.cv2-kpi-sub { font-size:9px; color:rgba(255,255,255,.25); font-family:monospace; }
.cv2-kpi-bar { position:absolute; bottom:0; left:0; height:1px; transition:width 1.4s cubic-bezier(.4,0,.2,1); }

/* ---- BODY ---- */
.cv2-body { max-width:1100px; margin:0 auto; padding:40px 32px 80px; }
.cv2-sec-head { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.cv2-sec-lbl { font-size:9px; font-weight:500; text-transform:uppercase; letter-spacing:.14em; color:rgba(255,255,255,.28); white-space:nowrap; font-family:monospace; }
.cv2-sec-line { flex:1; height:1px; background:rgba(255,255,255,.055); }
.cv2-sec-count { font-size:9px; color:rgba(255,255,255,.25); white-space:nowrap; font-family:monospace; }
.cv2-section { margin-bottom:48px; }

/* global progress */
.cv2-gp {
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.055);
  border-radius:8px; padding:20px 24px; margin-bottom:32px;
}
.cv2-gp-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.cv2-gp-title { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.3); font-family:monospace; }
.cv2-gp-pct { font-family:var(--font-display); font-size:22px; font-weight:600; }
.cv2-gp-bar { height:3px; background:rgba(255,255,255,.05); border-radius:2px; overflow:hidden; margin-bottom:12px; }
.cv2-gp-fill { height:100%; border-radius:2px; transition:width 1.8s cubic-bezier(.4,0,.2,1); }
.cv2-gp-steps { display:flex; gap:4px; }
.cv2-gp-step { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,.06); }
.cv2-gp-step.done { background:#34d399; opacity:.7; }
.cv2-gp-step.curr { background:var(--c-accent); }

/* filters */
.cv2-filters { display:flex; gap:2px; margin-bottom:24px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.055); border-radius:6px; padding:3px; width:fit-content; }
.cv2-fb {
  font-size:10px; text-transform:uppercase; letter-spacing:.08em;
  padding:5px 14px; border-radius:4px; border:none; cursor:pointer;
  color:rgba(255,255,255,.3); background:transparent; transition:all .14s;
  font-family:monospace;
}
.cv2-fb:hover { color:rgba(255,255,255,.6); background:rgba(255,255,255,.04); }
.cv2-fb.active { color:#f0f0f4; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); }

/* tasks */
.cv2-tg { margin-bottom:28px; }
.cv2-tg-head { display:flex; align-items:center; gap:10px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,.055); }
.cv2-tg-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.cv2-tg-lbl { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.3); font-family:monospace; }
.cv2-tg-n { font-size:9px; padding:1px 6px; border-radius:10px; background:rgba(255,255,255,.04); color:rgba(255,255,255,.25); border:1px solid rgba(255,255,255,.06); font-family:monospace; }
.cv2-trow {
  display:flex; align-items:center; gap:14px;
  padding:11px 14px;
  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.055);
  border-radius:6px; margin-bottom:4px;
  transition:all .18s; position:relative; overflow:hidden;
  animation:cv2RowIn .4s cubic-bezier(.34,1.1,.64,1) both;
}
.cv2-trow::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:transparent; transition:background .18s; border-radius:2px 0 0 2px; }
.cv2-trow:hover { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.1); }
.cv2-trow:hover::before { background:var(--row-c); }
@keyframes cv2RowIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
.cv2-trow.done .cv2-tname { color:rgba(255,255,255,.25); text-decoration:line-through; text-decoration-color:rgba(255,255,255,.2); }
.cv2-tsdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cv2-tname { font-size:13px; color:#f0f0f4; font-weight:400; flex:1; line-height:1.4; }
.cv2-tnote { font-size:10px; color:rgba(255,255,255,.28); font-style:italic; margin-left:21px; margin-top:3px; margin-bottom:-4px; padding-bottom:4px; display:block; font-family:monospace; }
.cv2-ttag { font-size:9px; text-transform:uppercase; letter-spacing:.06em; padding:2px 7px; border-radius:3px; flex-shrink:0; font-family:monospace; }

/* timeline */
.cv2-tl { position:relative; }
.cv2-tl-item { display:grid; grid-template-columns:28px 1fr; animation:cv2RowIn .4s cubic-bezier(.34,1.1,.64,1) both; }
.cv2-tl-track { display:flex; flex-direction:column; align-items:center; padding-top:5px; }
.cv2-tl-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; position:relative; z-index:1; }
.cv2-tl-dot.active::after { content:''; position:absolute; inset:-5px; border-radius:50%; border:1px solid currentColor; opacity:.3; animation:cv-pulse 2.5s ease-out infinite; }
.cv2-tl-line { width:1px; flex:1; min-height:16px; background:rgba(255,255,255,.055); margin:4px 0; }
.cv2-tl-card { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.055); border-radius:8px; padding:14px 18px; margin-bottom:8px; margin-left:10px; transition:all .18s; }
.cv2-tl-card:hover { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.1); }
.cv2-tl-card.curr { border-color:rgba(201,168,108,.22); background:rgba(201,168,108,.025); }
.cv2-tl-date { font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:rgba(255,255,255,.28); margin-bottom:6px; font-family:monospace; }
.cv2-tl-name { font-family:var(--font-display); font-size:14px; font-weight:500; margin-bottom:4px; }
.cv2-tl-desc { font-size:12px; color:rgba(255,255,255,.4); line-height:1.5; margin-bottom:10px; }
.cv2-tl-badge { display:inline-flex; align-items:center; gap:5px; font-size:9px; text-transform:uppercase; letter-spacing:.08em; padding:3px 9px; border-radius:20px; font-family:monospace; }
.cv2-etb-done { background:rgba(52,211,153,.1); color:#34d399; border:1px solid rgba(52,211,153,.2); }
.cv2-etb-curr { background:rgba(201,168,108,.1); color:var(--c-accent); border:1px solid rgba(201,168,108,.22); }
.cv2-etb-todo { background:rgba(255,255,255,.03); color:rgba(255,255,255,.3); border:1px solid rgba(255,255,255,.08); }

/* footer */
.cv2-footer { border-top:1px solid rgba(255,255,255,.055); padding:32px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:32px; }
.cv2-footer-brand { font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--c-accent); letter-spacing:-.02em; margin-bottom:4px; }
.cv2-footer-sub { font-size:10px; color:rgba(255,255,255,.25); line-height:1.8; font-family:monospace; }
.cv2-footer-r { text-align:right; }
.cv2-footer-proj { font-size:11px; color:rgba(255,255,255,.4); margin-bottom:3px; font-family:monospace; }
.cv2-footer-dl { font-size:10px; color:rgba(255,255,255,.25); font-family:monospace; }
.cv2-empty { padding:32px 20px; text-align:center; font-size:11px; color:rgba(255,255,255,.25); border:1px dashed rgba(255,255,255,.06); border-radius:8px; font-family:monospace; }

@media(max-width:768px) {
  .cv2-hero-inner { grid-template-columns:1fr; }
  .cv2-ring { width:90px; height:90px; }
  .cv2-ring-pct { font-size:20px; }
  .cv2-kpi-strip { grid-template-columns:1fr; }
  .cv2-kpi { border-right:none; border-bottom:1px solid rgba(255,255,255,.055); }
  .cv2-kpi:last-child { border-bottom:none; }
  .cv2-body { padding:28px 20px 60px; }
  .cv-topnav { padding:0 16px; }
  .cv2-footer { grid-template-columns:1fr; }
  .cv2-footer-r { text-align:left; }
  .cv2-hero { padding:56px 20px 40px; }
}
